<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Embed - Deoit Code Editor</title>
  <meta name="robots" content="noindex, nofollow">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; background: #0d0d0d; }
    .embed-loading {
      display: flex; align-items: center; justify-content: center;
      height: 100vh; font-family: -apple-system, sans-serif;
      color: #8a8a8a; font-size: 14px; gap: 10px;
    }
    .embed-loading .spinner {
      width: 20px; height: 20px; border: 2px solid #252525;
      border-top-color: #e8e8e8; border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    iframe {
      width: 100%; height: 100%; border: none;
    }
  </style>
  <script defer src="https://cloud.umami.is/script.js" data-website-id="e41f2e20-74af-4d7a-a757-5eed0348d629"></script>
</head>
<body>
  <div class="embed-loading" id="loading">
    <div class="spinner"></div>
    Loading Deoit Editor...
  </div>
  <iframe id="editorFrame" src="about:blank" style="display:none;" sandbox="allow-scripts allow-forms allow-popups" allowfullscreen></iframe>
  <script>
    (function() {
      var params = new URLSearchParams(window.location.search);
      var frame = document.getElementById('editorFrame');
      var loading = document.getElementById('loading');

      var htmlContent = params.get('html') || '';
      var cssContent = params.get('css') || '';
      var jsContent = params.get('js') || '';
      var theme = params.get('theme') || '';

      var editorUrl = '/pages/editor?embed=1';
      if (htmlContent) editorUrl += '&html=' + encodeURIComponent(htmlContent);
      if (cssContent) editorUrl += '&css=' + encodeURIComponent(cssContent);
      if (jsContent) editorUrl += '&js=' + encodeURIComponent(jsContent);
      if (theme) editorUrl += '&theme=' + encodeURIComponent(theme);

      frame.onload = function() {
        loading.style.display = 'none';
        frame.style.display = 'block';
      };

      frame.src = editorUrl;

      // Auto-resize height based on parent message
      window.addEventListener('message', function(e) {
        if (e.origin !== window.location.origin) return;
        if (e.data && e.data.type === 'deoit-resize') {
          document.body.style.height = e.data.height + 'px';
        }
      });
    })();
  </script>
</body>
</html>
