<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a1a"/>
      <stop offset="100%" style="stop-color:#0d0d0d"/>
    </linearGradient>
    <linearGradient id="g2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e06c75"/>
      <stop offset="33%" style="stop-color:#61afef"/>
      <stop offset="66%" style="stop-color:#e5c07b"/>
      <stop offset="100%" style="stop-color:#98c379"/>
    </linearGradient>
    <linearGradient id="glow" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.06"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1280" height="640" fill="url(#g1)"/>
  
  <!-- Subtle grid -->
  <g opacity="0.03">
    <line x1="0" y1="80" x2="1280" y2="80" stroke="white" stroke-width="1"/>
    <line x1="0" y1="160" x2="1280" y2="160" stroke="white" stroke-width="1"/>
    <line x1="0" y1="240" x2="1280" y2="240" stroke="white" stroke-width="1"/>
    <line x1="0" y1="320" x2="1280" y2="320" stroke="white" stroke-width="1"/>
    <line x1="0" y1="400" x2="1280" y2="400" stroke="white" stroke-width="1"/>
    <line x1="0" y1="480" x2="1280" y2="480" stroke="white" stroke-width="1"/>
    <line x1="0" y1="560" x2="1280" y2="560" stroke="white" stroke-width="1"/>
    <line x1="160" y1="0" x2="160" y2="640" stroke="white" stroke-width="1"/>
    <line x1="320" y1="0" x2="320" y2="640" stroke="white" stroke-width="1"/>
    <line x1="480" y1="0" x2="480" y2="640" stroke="white" stroke-width="1"/>
    <line x1="640" y1="0" x2="640" y2="640" stroke="white" stroke-width="1"/>
    <line x1="800" y1="0" x2="800" y2="640" stroke="white" stroke-width="1"/>
    <line x1="960" y1="0" x2="960" y2="640" stroke="white" stroke-width="1"/>
    <line x1="1120" y1="0" x2="1120" y2="640" stroke="white" stroke-width="1"/>
  </g>
  
  <!-- Glow -->
  <ellipse cx="640" cy="280" rx="500" ry="250" fill="url(#glow)"/>
  
  <!-- Logo -->
  <rect x="590" y="100" width="100" height="100" rx="20" fill="#1a1a1a" stroke="#333" stroke-width="2"/>
  <text x="640" y="168" font-family="system-ui, -apple-system, sans-serif" font-size="52" font-weight="800" fill="white" text-anchor="middle">D</text>
  
  <!-- Title -->
  <text x="640" y="280" font-family="system-ui, -apple-system, sans-serif" font-size="64" font-weight="800" fill="white" text-anchor="middle" letter-spacing="-2">Deoit</text>
  
  <!-- Subtitle -->
  <text x="640" y="330" font-family="system-ui, -apple-system, sans-serif" font-size="26" font-weight="500" fill="#8a8a8a" text-anchor="middle">Free Online Code Editor</text>
  
  <!-- Accent line -->
  <rect x="540" y="355" width="200" height="3" rx="1.5" fill="url(#g2)"/>
  
  <!-- Language pills -->
  <g transform="translate(640, 420)">
    <!-- HTML -->
    <rect x="-320" y="-18" width="100" height="36" rx="18" fill="#e06c75" opacity="0.15" stroke="#e06c75" stroke-width="1.5"/>
    <text x="-270" y="5" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="700" fill="#e06c75" text-anchor="middle">HTML</text>
    
    <!-- CSS -->
    <rect x="-195" y="-18" width="80" height="36" rx="18" fill="#61afef" opacity="0.15" stroke="#61afef" stroke-width="1.5"/>
    <text x="-155" y="5" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="700" fill="#61afef" text-anchor="middle">CSS</text>
    
    <!-- JS -->
    <rect x="-90" y="-18" width="110" height="36" rx="18" fill="#e5c07b" opacity="0.15" stroke="#e5c07b" stroke-width="1.5"/>
    <text x="-35" y="5" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="700" fill="#e5c07b" text-anchor="middle">JavaScript</text>
    
    <!-- React -->
    <rect x="40" y="-18" width="95" height="36" rx="18" fill="#61dafb" opacity="0.15" stroke="#61dafb" stroke-width="1.5"/>
    <text x="87" y="5" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="700" fill="#61dafb" text-anchor="middle">React</text>
    
    <!-- Node -->
    <rect x="150" y="-18" width="100" height="36" rx="18" fill="#98c379" opacity="0.15" stroke="#98c379" stroke-width="1.5"/>
    <text x="200" y="5" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="700" fill="#98c379" text-anchor="middle">Node.js</text>
  </g>
  
  <!-- Features -->
  <g font-family="system-ui, -apple-system, sans-serif" font-size="18" fill="#666" text-anchor="middle">
    <text x="280" y="520">⚡ Syntax Highlighting</text>
    <text x="640" y="520">🚀 Live Preview</text>
    <text x="1000" y="520">📚 81+ Free Lessons</text>
  </g>
  
  <!-- URL -->
  <text x="640" y="590" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="600" fill="#444" text-anchor="middle">deoit.js.org</text>
</svg>
