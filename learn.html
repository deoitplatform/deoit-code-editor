<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Learn - Deoit</title>
<link rel="icon" type="image/png" href="logo.png">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap">
<link rel="stylesheet" href="css/style.css">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--font-sans);background:var(--bg-dark);color:var(--text-primary);overflow-x:hidden}
.learn{display:flex;min-height:100vh}

/* SIDEBAR */
.sidebar{width:260px;background:#0a0a0a;border-right:1px solid var(--border-subtle);position:fixed;top:0;left:0;height:100vh;overflow-y:auto;padding:16px 0;z-index:100;transition:transform .3s}
.sidebar::-webkit-scrollbar{width:4px}
.sidebar::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.sb-head{padding:0 16px 14px;border-bottom:1px solid var(--border-subtle);margin-bottom:8px;display:flex;align-items:center;gap:10px}
.sb-head img{width:24px;height:24px;border-radius:5px}
.sb-head span{font-size:16px;font-weight:700}
.sb-head a{color:var(--text-primary);text-decoration:none}
.sb-search{margin:8px 12px;position:relative}
.sb-search input{width:100%;padding:8px 12px 8px 32px;background:var(--bg-card);border:1px solid var(--border-subtle);border-radius:6px;color:var(--text-primary);font-size:12px;font-family:var(--font-sans);outline:none}
.sb-search input:focus{border-color:var(--border)}
.sb-search svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);width:14px;height:14px;color:var(--text-muted)}
.nav-sec{margin-bottom:4px}
.nav-sec-t{padding:8px 16px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--text-muted);cursor:pointer;display:flex;align-items:center;justify-content:space-between;user-select:none}
.nav-sec-t:hover{color:var(--text-secondary)}
.nav-sec-t .arr{transition:transform .2s;font-size:9px}
.nav-sec.closed .arr{transform:rotate(-90deg)}
.nav-sec.closed .nav-links{display:none}
.nav-links{display:flex;flex-direction:column;gap:1px}
.nav-link{padding:7px 16px 7px 24px;font-size:12.5px;color:var(--text-secondary);text-decoration:none;transition:all .12s;border-left:2px solid transparent;display:block}
.nav-link:hover{background:rgba(217,217,217,.04);color:var(--text-primary)}
.nav-link.on{color:var(--accent);background:rgba(217,217,217,.06);border-left-color:var(--accent);font-weight:600}

/* MAIN */
.main{flex:1;margin-left:260px;padding:0;min-height:100vh}
.topbar{display:flex;align-items:center;padding:10px 32px;background:rgba(10,10,10,.9);backdrop-filter:blur(10px);border-bottom:1px solid var(--border-subtle);position:sticky;top:0;z-index:50;gap:12px}
.topbar .mob-btn{display:none;background:none;border:none;color:var(--text-primary);cursor:pointer;padding:8px}
.topbar .breadcrumb{font-size:13px;color:var(--text-secondary)}
.topbar .breadcrumb a{color:var(--text-muted);text-decoration:none}
.topbar .breadcrumb a:hover{color:var(--accent)}
.topbar .breadcrumb span{margin:0 6px;color:var(--text-muted)}
.topbar-right{margin-left:auto;display:flex;gap:8px}

.article{max-width:780px;margin:0 auto;padding:40px 48px 80px}
.article h1{font-size:clamp(28px,4vw,36px);font-weight:800;letter-spacing:-1px;margin-bottom:8px;line-height:1.2}
.article .intro{font-size:15px;color:var(--text-secondary);line-height:1.7;margin-bottom:32px;padding-bottom:24px;border-bottom:1px solid var(--border-subtle)}
.article h2{font-size:22px;font-weight:700;margin:44px 0 14px;padding-bottom:10px;border-bottom:1px solid var(--border-subtle)}
.article h3{font-size:17px;font-weight:700;margin:28px 0 10px}
.article p{font-size:15px;color:var(--text-secondary);line-height:1.8;margin-bottom:14px}
.article ul,.article ol{margin:0 0 18px 20px;color:var(--text-secondary);font-size:15px;line-height:1.8}
.article li{margin-bottom:5px}
.article code{font-family:var(--font-mono);font-size:13px;background:var(--bg-code);padding:2px 7px;border-radius:4px;color:var(--accent-js)}
.article pre{background:var(--bg-code);border:1px solid var(--border-subtle);border-radius:var(--radius-sm);padding:18px 22px;overflow-x:auto;margin:0 0 20px;font-family:var(--font-mono);font-size:13px;line-height:1.8;position:relative}
.article pre code{background:none;padding:0;color:inherit}
.article table{width:100%;border-collapse:collapse;margin:0 0 20px;font-size:14px}
.article th,.article td{padding:10px 14px;border:1px solid var(--border-subtle);text-align:left}
.article th{background:var(--bg-card);font-weight:600;font-size:13px}
.article td{color:var(--text-secondary)}
.article a{color:var(--accent)}

/* EXAMPLE BOX */
.example{background:var(--bg-card);border:1px solid var(--border-subtle);border-radius:var(--radius-sm);margin:0 0 24px;overflow:hidden}
.example-head{padding:10px 16px;background:#111;border-bottom:1px solid var(--border-subtle);display:flex;align-items:center;justify-content:space-between}
.example-head span{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--text-secondary)}
.example-head button{background:var(--accent);color:#111;border:none;padding:6px 14px;border-radius:5px;font-size:11px;font-weight:700;cursor:pointer;font-family:var(--font-sans);transition:background .15s}
.example-head button:hover{background:var(--accent-hover)}
.example-body{padding:0}
.example-body pre{margin:0;border:0;border-radius:0;padding:18px 22px}

/* NOTE / TIP */
.note{background:rgba(97,175,239,.06);border:1px solid rgba(97,175,239,.15);border-radius:var(--radius-sm);padding:14px 18px;margin:18px 0;font-size:14px;line-height:1.7;color:var(--text-secondary)}
.note strong{color:#61afef}
.tip{background:rgba(152,195,121,.06);border:1px solid rgba(152,195,121,.15);border-radius:var(--radius-sm);padding:14px 18px;margin:18px 0;font-size:14px;line-height:1.7;color:var(--text-secondary)}
.tip strong{color:#98c379}
.warn{background:rgba(224,108,117,.06);border:1px solid rgba(224,108,117,.15);border-radius:var(--radius-sm);padding:14px 18px;margin:18px 0;font-size:14px;line-height:1.7;color:var(--text-secondary)}
.warn strong{color:#e06c75}

/* HOME CARDS */
.home-hero{text-align:center;padding:48px 0 36px}
.home-hero h1{font-size:clamp(32px,5vw,44px);font-weight:800;letter-spacing:-1.5px;margin-bottom:12px}
.home-hero h1 span{color:var(--accent)}
.home-hero p{font-size:16px;color:var(--text-secondary);max-width:500px;margin:0 auto 28px;line-height:1.6}
.cat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:16px;margin:24px 0}
.cat-card{background:var(--bg-card);border:1px solid var(--border-subtle);border-radius:var(--radius);padding:24px;cursor:pointer;transition:all .2s;text-decoration:none;color:inherit}
.cat-card:hover{border-color:var(--border);transform:translateY(-3px)}
.cat-card .icon{font-size:28px;margin-bottom:12px}
.cat-card h3{font-size:17px;font-weight:700;margin-bottom:6px}
.cat-card p{font-size:13px;color:var(--text-secondary);line-height:1.5;margin:0}
.cat-card .count{font-size:11px;color:var(--text-muted);margin-top:10px}

/* NAV BUTTONS */
.nav-btns{display:flex;justify-content:space-between;margin-top:48px;padding-top:24px;border-top:1px solid var(--border-subtle)}
.nav-btn{display:flex;flex-direction:column;gap:4px;padding:14px 18px;background:var(--bg-card);border:1px solid var(--border-subtle);border-radius:var(--radius-sm);text-decoration:none;transition:all .2s;min-width:0;flex:1;max-width:48%}
.nav-btn:hover{border-color:var(--border)}
.nav-btn .label{font-size:11px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px}
.nav-btn .title{font-size:13px;font-weight:600;color:var(--text-primary)}
.nav-btn.next{text-align:right;margin-left:auto}

/* OVERLAY */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:99}
.overlay.show{display:block}

@media(max-width:860px){
  .sidebar{transform:translateX(-100%);z-index:150}
  .sidebar.open{transform:translateX(0)}
  .overlay.show{display:block}
  .topbar .mob-btn{display:flex}
  .main{margin-left:0}
  .article{padding:28px 18px 80px}
  .topbar{padding:10px 16px}
  .nav-btns{flex-direction:column;gap:10px}
  .nav-btn{max-width:100%}
}
</style>
</head>
<body>
<div class="learn">
  <div class="overlay" id="ov"></div>
  <aside class="sidebar" id="side">
    <div class="sb-head">
      <a href="/" style="display:flex;align-items:center;gap:10px">
        <img src="logo.png" alt="Deoit"><span>Learn</span>
      </a>
    </div>
    <div class="sb-search">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input type="text" id="searchInput" placeholder="Search...">
    </div>
    <nav id="nav"></nav>
  </aside>
  <div class="main">
    <div class="topbar">
      <button class="mob-btn" id="mobBtn" aria-label="Menu">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 6h16M4 12h16M4 18h16"/></svg>
      </button>
      <div class="breadcrumb" id="breadcrumb"></div>
      <div class="topbar-right">
        <a href="pages/editor" class="btn btn-accent btn-sm" style="text-decoration:none">Open Editor</a>
      </div>
    </div>
    <div class="article" id="article"></div>
  </div>
</div>
<script src="js/learn.js"></script>
</body>
</html>
