<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Learn Web Development - Deoit</title>
<meta name="description" content="Learn HTML, CSS, JavaScript, React, and Node.js for free. Interactive tutorials with live code examples.">
<meta name="keywords" content="learn web development, HTML tutorial, CSS tutorial, JavaScript tutorial, free coding course">
<meta name="author" content="Majed Qandeel">
<meta name="robots" content="index, follow">
<meta property="og:type" content="website">
<meta property="og:url" content="https://deoit.vercel.app/learn">
<meta property="og:title" content="Learn Web Development - Deoit">
<meta property="og:description" content="Free interactive web development tutorials with live code examples.">
<meta property="og:image" content="https://deoit.vercel.app/logo.png">
<link rel="canonical" href="https://deoit.vercel.app/learn">
<link rel="icon" type="image/png" href="logo.png">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#060606;--bg2:#0e0e0e;--bg3:#151515;--bg4:#1c1c1c;--bg5:#242424;
  --tx:#e8e8e8;--tx2:#999;--tx3:#555;--tx4:#333;
  --accent:#fff;--green:#4caf50;--blue:#42a5f5;--orange:#ff9800;--red:#ef5350;--purple:#ab47bc;
  --accent-html:#f06565;--accent-css:#339af0;--accent-js:#fcc419;--accent-react:#61dafb;--accent-node:#69db7c;
  --border:#1e1e1e;--border2:#282828;
  --font:'Inter',system-ui,-apple-system,sans-serif;
  --mono:'SF Mono','Cascadia Code','Fira Code',Consolas,monospace;
}
html{scroll-behavior:smooth}
body{font-family:var(--font);background:var(--bg);color:var(--tx);line-height:1.6;-webkit-font-smoothing:antialiased}
a{color:inherit;text-decoration:none}

/* ═══ WRAP ═══ */
.learn-wrap{display:flex;min-height:100vh}

/* ═══ SIDEBAR ═══ */
.learn-sb{
  width:272px;background:var(--bg2);border-right:1px solid var(--border);
  position:fixed;top:0;left:0;height:100vh;overflow-y:auto;z-index:100;
  padding:0;display:flex;flex-direction:column;transition:transform .3s;
}
.learn-sb::-webkit-scrollbar{width:3px}
.learn-sb::-webkit-scrollbar-thumb{background:#333;border-radius:3px}

.learn-sb-logo{padding:20px 20px 16px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border)}
.learn-sb-logo img{width:28px;height:28px;border-radius:6px}
.learn-sb-logo .logo-text{font-size:17px;font-weight:800;letter-spacing:-.3px;color:var(--tx)}
.learn-sb-logo .logo-sub{font-size:11px;color:var(--tx3);font-weight:500;margin-left:auto;text-transform:uppercase;letter-spacing:.5px}

.learn-sb-search{padding:12px 16px 8px;position:relative}
.learn-sb-search input{
  width:100%;padding:9px 12px 9px 34px;background:var(--bg4);border:1px solid var(--border2);
  border-radius:8px;color:var(--tx);font-size:13px;font-family:var(--font);outline:none;transition:border .2s;
}
.learn-sb-search input:focus{border-color:#444}
.learn-sb-search input::placeholder{color:var(--tx4)}
.learn-sb-search svg{position:absolute;left:27px;top:50%;transform:translateY(-50%);width:14px;height:14px;color:var(--tx4)}

.learn-sb-nav{flex:1;overflow-y:auto;padding:4px 0 24px}

.learn-sb-sec{margin-bottom:2px}
.learn-sb-sec-t{
  padding:9px 20px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;
  color:var(--tx3);cursor:pointer;display:flex;align-items:center;gap:6px;user-select:none;transition:color .15s;
}
.learn-sb-sec-t:hover{color:var(--tx2)}
.learn-sb-sec-t .dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.learn-sb-sec-t .arr{margin-left:auto;font-size:8px;transition:transform .2s}
.learn-sb-sec.closed .arr{transform:rotate(-90deg)}
.learn-sb-sec.closed .learn-sb-links{display:none}

.learn-sb-links{display:flex;flex-direction:column;gap:0;padding:0 0 6px}
.learn-sb-link{
  padding:6px 20px 6px 32px;font-size:13px;color:var(--tx2);text-decoration:none;
  transition:all .1s;display:block;position:relative;
}
.learn-sb-link::before{
  content:'';position:absolute;left:20px;top:50%;width:3px;height:3px;border-radius:50%;
  background:var(--tx4);transform:translateY(-50%);transition:all .15s;
}
.learn-sb-link:hover{color:var(--tx);background:rgba(255,255,255,.02)}
.learn-sb-link:hover::before{background:var(--tx2)}
.learn-sb-link.on{color:#fff;font-weight:600;background:rgba(255,255,255,.04)}
.learn-sb-link.on::before{background:var(--green);width:5px;height:5px}

/* ═══ MAIN ═══ */
.learn-main{flex:1;margin-left:272px;min-height:100vh;display:flex;flex-direction:column}

.learn-topbar{
  display:flex;align-items:center;padding:0 32px;height:48px;
  background:rgba(6,6,6,.85);backdrop-filter:blur(16px) saturate(1.2);
  border-bottom:1px solid var(--border);position:sticky;top:0;z-index:50;
}
.learn-topbar .mob-btn{display:none;background:none;border:none;color:var(--tx);cursor:pointer;padding:6px;margin-right:8px;border-radius:6px}
.learn-topbar .mob-btn:hover{background:var(--bg4)}
.learn-bc{font-size:13px;color:var(--tx3);display:flex;align-items:center;gap:0}
.learn-bc a{color:var(--tx3);transition:color .15s}
.learn-bc a:hover{color:var(--tx)}
.learn-bc .sep{margin:0 8px;font-size:10px;color:var(--tx4)}
.learn-topbar-r{margin-left:auto;display:flex;gap:10px;align-items:center}
.learn-editor-btn{
  background:var(--green);color:#000;border:none;padding:6px 14px;border-radius:6px;
  font-size:12px;font-weight:700;cursor:pointer;font-family:var(--font);transition:all .15s;text-decoration:none;
}
.learn-editor-btn:hover{background:#66bb6a;transform:translateY(-1px)}

/* ═══ ARTICLE ═══ */
.learn-article{max-width:820px;width:100%;margin:0 auto;padding:48px 56px 100px;flex:1}

.learn-article h1{
  font-size:38px;font-weight:900;letter-spacing:-1.2px;line-height:1.15;
  margin-bottom:16px;color:#fff;
}
.learn-article .intro-text{
  font-size:16px;color:var(--tx2);line-height:1.7;margin-bottom:40px;
  padding-bottom:32px;border-bottom:1px solid var(--border);
}

.learn-article h2{
  font-size:24px;font-weight:800;letter-spacing:-.5px;margin:52px 0 16px;
  color:#fff;position:relative;padding-bottom:12px;
}
.learn-article h2::after{
  content:'';position:absolute;bottom:0;left:0;width:40px;height:3px;
  background:var(--green);border-radius:2px;
}

.learn-article h3{font-size:18px;font-weight:700;margin:32px 0 12px;color:#fff}
.learn-article p{font-size:15px;color:var(--tx2);line-height:1.75;margin-bottom:16px}
.learn-article ul,.learn-article ol{margin:0 0 20px 24px;color:var(--tx2);font-size:15px;line-height:1.8}
.learn-article li{margin-bottom:6px}
.learn-article li::marker{color:var(--tx4)}

.learn-article code{
  font-family:var(--mono);font-size:12.5px;background:var(--bg4);padding:2px 7px;
  border-radius:4px;color:var(--accent-js);border:1px solid var(--border2);
}
.learn-article pre{
  background:var(--bg3);border:1px solid var(--border2);border-radius:10px;
  padding:20px 24px;overflow-x:auto;margin:0 0 24px;
  font-family:var(--mono);font-size:13px;line-height:1.8;
}
.learn-article pre code{background:none;padding:0;border:0;color:var(--tx);font-size:13px}

.learn-article table{width:100%;border-collapse:collapse;margin:0 0 24px;font-size:14px;border-radius:8px;overflow:hidden;border:1px solid var(--border2)}
.learn-article th,.learn-article td{padding:11px 16px;text-align:left;border-bottom:1px solid var(--border2)}
.learn-article th{background:var(--bg4);font-weight:700;font-size:12px;text-transform:uppercase;letter-spacing:.3px;color:var(--tx2)}
.learn-article td{color:var(--tx2)}
.learn-article td code{font-size:12px}

.learn-article a{color:var(--green);font-weight:500;transition:color .15s}
.learn-article a:hover{color:#81c784}

/* ═══ EXAMPLE BOX ═══ */
.learn-example{
  background:var(--bg3);border:1px solid var(--border2);border-radius:12px;
  margin:0 0 28px;overflow:hidden;
}
.learn-ex-head{
  padding:11px 18px;background:var(--bg4);border-bottom:1px solid var(--border2);
  display:flex;align-items:center;justify-content:space-between;
}
.learn-ex-head .ex-label{
  font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--tx3);
}
.learn-ex-head .ex-dots{display:flex;gap:6px;margin-right:auto;margin-left:12px}
.learn-ex-head .ex-dots i{width:10px;height:10px;border-radius:50%;border:1.5px solid var(--border2)}
.learn-ex-head .ex-dots i:nth-child(1){background:#ff5f57}
.learn-ex-head .ex-dots i:nth-child(2){background:#febc2e}
.learn-ex-head .ex-dots i:nth-child(3){background:#28c840}

.learn-ex-try{
  background:var(--green);color:#000;border:none;padding:6px 16px;border-radius:6px;
  font-size:11.5px;font-weight:700;cursor:pointer;font-family:var(--font);
  transition:all .15s;letter-spacing:.2px;
}
.learn-ex-try:hover{background:#66bb6a;transform:translateY(-1px);box-shadow:0 4px 12px rgba(76,175,80,.25)}
.learn-ex-body{padding:0}
.learn-ex-body pre{margin:0;border:0;border-radius:0;padding:20px 24px;background:transparent}
.learn-ex-body pre code{color:var(--tx);line-height:1.75}

/* ═══ NOTE / TIP / WARN ═══ */
.learn-note{
  background:rgba(66,165,245,.06);border-left:3px solid var(--blue);
  border-radius:0 8px 8px 0;padding:14px 20px;margin:20px 0;font-size:14px;line-height:1.7;color:var(--tx2);
}
.learn-note strong{color:var(--blue)}

.learn-tip{
  background:rgba(76,175,80,.06);border-left:3px solid var(--green);
  border-radius:0 8px 8px 0;padding:14px 20px;margin:20px 0;font-size:14px;line-height:1.7;color:var(--tx2);
}
.learn-tip strong{color:var(--green)}

.learn-warn{
  background:rgba(239,83,80,.06);border-left:3px solid var(--red);
  border-radius:0 8px 8px 0;padding:14px 20px;margin:20px 0;font-size:14px;line-height:1.7;color:var(--tx2);
}
.learn-warn strong{color:var(--red)}

/* ═══ HOME ═══ */
.learn-home{text-align:center;padding:20px 0 0}
.learn-home h1{
  font-size:clamp(36px,5vw,52px);font-weight:900;letter-spacing:-2px;
  line-height:1.1;margin-bottom:16px;color:#fff;
}
.learn-home h1 .hl{background:linear-gradient(135deg,var(--green),#81c784);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.learn-home .sub{font-size:17px;color:var(--tx2);max-width:520px;margin:0 auto 40px;line-height:1.6}

.learn-cats{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:14px;margin:20px 0}
.learn-cat{
  background:var(--bg3);border:1px solid var(--border2);border-radius:14px;
  padding:28px 24px;text-align:left;cursor:pointer;transition:all .25s;text-decoration:none;color:inherit;
}
.learn-cat:hover{border-color:#333;transform:translateY(-4px);box-shadow:0 12px 32px rgba(0,0,0,.4)}
.learn-cat .cat-icon{font-size:32px;margin-bottom:14px;display:block}
.learn-cat h3{font-size:18px;font-weight:800;margin-bottom:4px;color:#fff}
.learn-cat p{font-size:13px;color:var(--tx3);margin:0;line-height:1.5}
.learn-cat .cat-count{font-size:11px;color:var(--tx4);margin-top:12px;font-weight:600;text-transform:uppercase;letter-spacing:.5px}

/* ═══ NAV BTNS ═══ */
.learn-nav-btns{display:flex;justify-content:space-between;margin-top:56px;padding-top:28px;border-top:1px solid var(--border)}
.learn-nav-btn{
  display:flex;flex-direction:column;gap:6px;padding:16px 20px;
  background:var(--bg3);border:1px solid var(--border2);border-radius:10px;
  text-decoration:none;transition:all .2s;flex:1;max-width:48%;
}
.learn-nav-btn:hover{border-color:#333;transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,.3)}
.learn-nav-btn .nb-label{font-size:11px;color:var(--tx4);text-transform:uppercase;letter-spacing:.6px;font-weight:600}
.learn-nav-btn .nb-title{font-size:14px;font-weight:700;color:var(--tx)}
.learn-nav-btn.nxt{text-align:right;margin-left:auto}

/* ═══ OVERLAY ═══ */
.learn-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:99;backdrop-filter:blur(4px)}
.learn-overlay.show{display:block}

@media(max-width:860px){
  .learn-sb{transform:translateX(-100%);z-index:200;width:280px}
  .learn-sb.open{transform:translateX(0)}
  .learn-overlay.show{display:block}
  .learn-topbar .mob-btn{display:flex}
  .learn-main{margin-left:0}
  .learn-article{padding:32px 20px 80px}
  .learn-article h1{font-size:28px}
  .learn-nav-btns{flex-direction:column;gap:10px}
  .learn-nav-btn{max-width:100%}
}
</style>
</head>
<body>
<div class="learn-wrap">
  <div class="learn-overlay" id="learnOv"></div>
  <aside class="learn-sb" id="learnSide">
    <div class="learn-sb-logo">
      <a href="/"><img src="logo.png" alt="Deoit"></a>
      <a href="/" class="logo-text">Learn</a>
      <span class="logo-sub">beta</span>
    </div>
    <div class="learn-sb-search">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input type="text" id="learnSearchInput" placeholder="Search lessons...">
    </div>
    <nav class="learn-sb-nav" id="learnNav"></nav>
  </aside>
  <div class="learn-main">
    <div class="learn-topbar">
      <button class="mob-btn" id="learnMobBtn" aria-label="Menu">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 6h16M4 12h16M4 18h16"/></svg>
      </button>
      <div class="learn-bc" id="learnBreadcrumb"></div>
      <div class="learn-topbar-r">
        <a href="pages/editor" class="learn-editor-btn">Open Editor</a>
      </div>
    </div>
    <div class="learn-article" id="learnArticle"></div>
  </div>
</div>
<script src="js/learn.js"></script>
</body>
</html>
