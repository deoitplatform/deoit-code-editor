<head>

<link rel="canonical" href="https://deoit.vercel.app/learn">
<link rel="icon" type="image/png" href="logo.png">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0d0d0d;--bg2:#141414;--bg3:#1a1a1a;--bg4:#222;
  --tx:#d9d9d9;--tx2:#8a8a8a;--tx3:#484848;
  --accent:#d9d9d9;--accent2:#b0b0b0;
  --accent-html:#e06c75;--accent-css:#61afef;--accent-js:#e5c07b;--accent-react:#61dafb;--accent-node:#98c379;--accent-tools:#c678dd;
  --border:#2a2a2a;--border2:#1a1a1a;
  --font:'Inter','Segoe UI',system-ui,-apple-system,sans-serif;
  --mono:'JetBrains Mono','Cascadia Code','Fira Code',Consolas,monospace;
  --r:12px;--rs:8px;
}
html{scroll-behavior:smooth}
body{font-family:var(--font);background:var(--bg);color:var(--tx);overflow-x:hidden;line-height:1.6}
a{color:var(--tx);text-decoration:none}
::selection{background:rgba(217,217,217,.12)}

/* ─── LAYOUT ─── */
.learn-wrap{display:flex;min-height:100vh}

/* ─── SIDEBAR ─── */
.learn-sb{width:260px;background:#0a0a0a;border-right:1px solid var(--border2);position:fixed;top:0;left:0;height:100vh;overflow-y:auto;padding:16px 0;z-index:100;transition:transform .3s}
.learn-sb::-webkit-scrollbar{width:4px}
.learn-sb::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.learn-sb-head{padding:0 16px 14px;border-bottom:1px solid var(--border2);margin-bottom:8px;display:flex;align-items:center;gap:10px}
.learn-sb-head img{width:24px;height:24px;border-radius:5px}
.learn-sb-head span{font-size:16px;font-weight:700}
.learn-sb-head a{color:var(--tx);text-decoration:none;display:flex;align-items:center;gap:10px}
.learn-sb-search{margin:8px 12px;position:relative}
.learn-sb-search input{width:100%;padding:8px 12px 8px 32px;background:var(--bg2);border:1px solid var(--border2);border-radius:6px;color:var(--tx);font-size:12px;font-family:var(--font);outline:none}
.learn-sb-search input:focus{border-color:var(--border)}
.learn-sb-search input::placeholder{color:var(--tx3)}
.learn-sb-search svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);width:14px;height:14px;color:var(--tx3)}
.learn-nav-sec{margin-bottom:4px}
.learn-nav-t{padding:8px 16px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--tx3);cursor:pointer;display:flex;align-items:center;justify-content:space-between;user-select:none}
.learn-nav-t:hover{color:var(--tx2)}
.learn-nav-t .arr{transition:transform .2s;font-size:9px}
.learn-nav-sec.closed .arr{transform:rotate(-90deg)}
.learn-nav-sec.closed .learn-nav-links{display:none}
.learn-nav-links{display:flex;flex-direction:column;gap:1px}
.learn-nav-link{padding:7px 16px 7px 24px;font-size:12.5px;color:var(--tx2);text-decoration:none;transition:all .12s;border-left:2px solid transparent;display:block}
.learn-nav-link:hover{background:rgba(217,217,217,.04);color:var(--tx)}
.learn-nav-link.on{color:var(--accent);background:rgba(217,217,217,.06);border-left-color:var(--accent);font-weight:600}

/* ─── MAIN ─── */
.learn-main{flex:1;margin-left:260px;padding:0;min-height:100vh}
.learn-topbar{display:flex;align-items:center;padding:10px 32px;background:rgba(10,10,10,.92);backdrop-filter:blur(10px);border-bottom:1px solid var(--border2);position:sticky;top:0;z-index:50;gap:12px}
.learn-topbar .mob-btn{display:none;background:none;border:none;color:var(--tx);cursor:pointer;padding:8px}
.learn-breadcrumb{font-size:13px;color:var(--tx2)}
.learn-breadcrumb a{color:var(--tx3);text-decoration:none}
.learn-breadcrumb a:hover{color:var(--accent)}
.learn-breadcrumb span{margin:0 6px;color:var(--tx3)}
.learn-topbar-right{margin-left:auto;display:flex;gap:8px}

/* ─── ARTICLE ─── */
.learn-article{max-width:800px;margin:0 auto;padding:40px 48px 80px}
.learn-article h1{font-size:clamp(28px,4vw,36px);font-weight:800;letter-spacing:-1px;margin-bottom:8px;line-height:1.2}
.learn-article .intro{font-size:15px;color:var(--tx2);line-height:1.7;margin-bottom:32px;padding-bottom:24px;border-bottom:1px solid var(--border2)}
.learn-article h2{font-size:22px;font-weight:700;margin:44px 0 14px;padding-bottom:10px;border-bottom:1px solid var(--border2)}
.learn-article h3{font-size:17px;font-weight:700;margin:28px 0 10px}
.learn-article p{font-size:15px;color:var(--tx2);line-height:1.8;margin-bottom:14px}
.learn-article ul,.learn-article ol{margin:0 0 18px 20px;color:var(--tx2);font-size:15px;line-height:1.8}
.learn-article li{margin-bottom:5px}
.learn-article code{font-family:var(--mono);font-size:13px;background:var(--bg3);padding:2px 7px;border-radius:4px;color:var(--accent-js)}
.learn-article pre{background:var(--bg3);border:1px solid var(--border2);border-radius:var(--rs);padding:18px 22px;overflow-x:auto;margin:0 0 20px;font-family:var(--mono);font-size:13px;line-height:1.8;position:relative}
.learn-article pre code{background:none;padding:0;color:inherit}
.learn-article table{width:100%;border-collapse:collapse;margin:0 0 20px;font-size:14px}
.learn-article th,.learn-article td{padding:10px 14px;border:1px solid var(--border2);text-align:left}
.learn-article th{background:var(--bg2);font-weight:600;font-size:13px}
.learn-article td{color:var(--tx2)}
.learn-article a{color:var(--accent)}

/* ─── EXAMPLE BOX ─── */
.learn-example{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--rs);margin:0 0 24px;overflow:hidden}
.learn-example-head{padding:10px 16px;background:#111;border-bottom:1px solid var(--border2);display:flex;align-items:center;justify-content:space-between}
.learn-example-head span{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--tx2)}
.learn-example-head button{background:var(--accent);color:#111;border:none;padding:6px 14px;border-radius:5px;font-size:11px;font-weight:700;cursor:pointer;font-family:var(--font);transition:background .15s}
.learn-example-head button:hover{background:var(--accent2)}
.learn-example-body{padding:0}
.learn-example-body pre{margin:0;border:0;border-radius:0;padding:18px 22px}

/* ─── NOTE / TIP / WARN ─── */
.learn-note{background:rgba(97,175,239,.06);border:1px solid rgba(97,175,239,.15);border-radius:var(--rs);padding:14px 18px;margin:18px 0;font-size:14px;line-height:1.7;color:var(--tx2)}
.learn-note strong{color:#61afef}
.learn-tip{background:rgba(152,195,121,.06);border:1px solid rgba(152,195,121,.15);border-radius:var(--rs);padding:14px 18px;margin:18px 0;font-size:14px;line-height:1.7;color:var(--tx2)}
.learn-tip strong{color:#98c379}
.learn-warn{background:rgba(224,108,117,.06);border:1px solid rgba(224,108,117,.15);border-radius:var(--rs);padding:14px 18px;margin:18px 0;font-size:14px;line-height:1.7;color:var(--tx2)}
.learn-warn strong{color:#e06c75}

/* ─── HOME ─── */
.learn-home-hero{text-align:center;padding:48px 0 36px}
.learn-home-hero h1{font-size:clamp(32px,5vw,44px);font-weight:800;letter-spacing:-1.5px;margin-bottom:12px}
.learn-home-hero h1 span{color:var(--accent)}
.learn-home-hero p{font-size:16px;color:var(--tx2);max-width:500px;margin:0 auto 28px;line-height:1.6}
.learn-cat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:16px;margin:24px 0}
.learn-cat-card{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--r);padding:24px;cursor:pointer;transition:all .2s;text-decoration:none;color:inherit}
.learn-cat-card:hover{border-color:var(--border);transform:translateY(-3px)}
.learn-cat-card .icon{font-size:28px;margin-bottom:12px}
.learn-cat-card h3{font-size:17px;font-weight:700;margin-bottom:6px}
.learn-cat-card p{font-size:13px;color:var(--tx2);line-height:1.5;margin:0}
.learn-cat-card .count{font-size:11px;color:var(--tx3);margin-top:10px}

/* ─── NAV BUTTONS ─── */
.learn-nav-btns{display:flex;justify-content:space-between;margin-top:48px;padding-top:24px;border-top:1px solid var(--border2)}
.learn-nav-btn{display:flex;flex-direction:column;gap:4px;padding:14px 18px;background:var(--bg2);border:1px solid var(--border2);border-radius:var(--rs);text-decoration:none;transition:all .2s;min-width:0;flex:1;max-width:48%}
.learn-nav-btn:hover{border-color:var(--border)}
.learn-nav-btn .label{font-size:11px;color:var(--tx3);text-transform:uppercase;letter-spacing:.5px}
.learn-nav-btn .title{font-size:13px;font-weight:600;color:var(--tx)}
.learn-nav-btn.next{text-align:right;margin-left:auto}

/* ─── OVERLAY ─── */
.learn-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:99}
.learn-overlay.show{display:block}

@media(max-width:860px){
  .learn-sb{transform:translateX(-100%);z-index:150}
  .learn-sb.open{transform:translateX(0)}
  .learn-overlay.show{display:block}
  .learn-topbar .mob-btn{display:flex}
  .learn-main{margin-left:0}
  .learn-article{padding:28px 18px 80px}
  .learn-topbar{padding:10px 16px}
  .learn-nav-btns{flex-direction:column;gap:10px}
  .learn-nav-btn{max-width:100%}
}
</style>
</head>
<body>
<div class="learn-wrap">
  <div class="learn-overlay" id="learnOv"></div>
  <aside class="learn-sb" id="learnSide">
    <div class="learn-sb-head">
      <a href="/" style="display:flex;align-items:center;gap:10px">
        <img src="logo.png" alt="Deoit"><span>Learn</span>
      </a>
    </div>
    <div class="learn-sb-search">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input type="text" id="learnSearchInput" placeholder="Search...">
    </div>
    <nav id="learnNav"></nav>
  </aside>
  <div class="learn-main">
    <div class="learn-topbar">
      <button class="mob-btn" id="learnMobBtn" aria-label="Menu">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 6h16M4 12h16M4 18h16"/></svg>
      </button>
      <div class="learn-breadcrumb" id="learnBreadcrumb"></div>
      <div class="learn-topbar-right">
        <a href="pages/editor" class="btn-accent" style="background:var(--accent);color:#111;padding:6px 14px;border-radius:6px;font-size:12px;font-weight:700;text-decoration:none">Open Editor</a>
      </div>
    </div>
    <div class="learn-article" id="learnArticle"></div>
  </div>
</div>
<script src="js/learn.js"></script>
</body>
</html>
