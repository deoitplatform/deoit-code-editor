<!DOCTYPE html>
<html lang="en" dir="ltr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0d0d0e">
  <title>Learn - Deoit</title>
  <link rel="icon" type="image/png" href="logo.png">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap">
  <link rel="stylesheet" href="css/style.css">
  <style>
    body { margin: 0; }
    .learn-wrap { display: flex; min-height: 100vh; }
    .learn-side {
      width: 260px; background: #0a0a0a; border-right: 1px solid var(--border-subtle);
      position: fixed; top: 0; left: 0; height: 100vh; overflow-y: auto; padding: 20px 0;
    }
    .learn-side-hdr { padding: 0 18px 18px; border-bottom: 1px solid var(--border-subtle); margin-bottom: 10px; display: flex; align-items: center; gap: 10px; }
    .learn-side-hdr img { width: 26px; height: 26px; border-radius: 6px; }
    .learn-side-hdr span { font-size: 17px; font-weight: 700; }
    .learn-side-hdr a { color: var(--text-primary); text-decoration: none; }
    .nav-g { margin-bottom: 6px; }
    .nav-g-t { padding: 8px 18px; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px; color: var(--text-muted); }
    .nav-a { display: block; padding: 8px 18px 8px 26px; font-size: 13px; color: var(--text-secondary); text-decoration: none; transition: all .15s; border-left: 2px solid transparent; }
    .nav-a:hover { background: rgba(217,217,217,.04); color: var(--text-primary); }
    .nav-a.on { color: var(--accent); background: rgba(217,217,217,.06); border-left-color: var(--accent); font-weight: 600; }
    .learn-body { flex: 1; margin-left: 260px; padding: 40px 48px 80px; max-width: 820px; }
    .learn-body h1 { font-size: 32px; font-weight: 800; letter-spacing: -1px; margin-bottom: 8px; }
    .learn-body .sub { font-size: 15px; color: var(--text-secondary); margin-bottom: 36px; line-height: 1.6; }
    .learn-body h2 { font-size: 22px; font-weight: 700; margin: 44px 0 14px; padding-bottom: 10px; border-bottom: 1px solid var(--border-subtle); }
    .learn-body h3 { font-size: 17px; font-weight: 700; margin: 28px 0 10px; }
    .learn-body p { font-size: 15px; color: var(--text-secondary); line-height: 1.8; margin-bottom: 14px; }
    .learn-body ul, .learn-body ol { margin: 0 0 18px 20px; color: var(--text-secondary); font-size: 15px; line-height: 1.8; }
    .learn-body li { margin-bottom: 5px; }
    .learn-body code { font-family: var(--font-mono); font-size: 13px; background: var(--bg-code); padding: 2px 7px; border-radius: 4px; color: var(--accent-js); }
    .learn-body pre { background: var(--bg-code); border: 1px solid var(--border-subtle); border-radius: var(--radius-sm); padding: 18px 22px; overflow-x: auto; margin: 0 0 20px; font-family: var(--font-mono); font-size: 13px; line-height: 1.8; }
    .learn-body pre code { background: none; padding: 0; color: inherit; }
    .learn-body table { width: 100%; border-collapse: collapse; margin: 0 0 20px; font-size: 14px; }
    .learn-body th, .learn-body td { padding: 10px 14px; border: 1px solid var(--border-subtle); text-align: left; }
    .learn-body th { background: var(--bg-card); font-weight: 600; font-size: 13px; }
    .learn-body td { color: var(--text-secondary); }
    .learn-body a { color: var(--accent); }
    .card-grid { display: grid; grid-template-columns: repeat(auto-fill,minmax(240px,1fr)); gap: 12px; margin: 24px 0; }
    .card { background: var(--bg-card); border: 1px solid var(--border-subtle); border-radius: var(--radius); padding: 22px; cursor: pointer; transition: all .2s; text-decoration: none; color: inherit; }
    .card:hover { border-color: var(--border); transform: translateY(-2px); }
    .card h3 { font-size: 16px; margin: 0 0 6px; }
    .card p { font-size: 13px; color: var(--text-secondary); margin: 0; line-height: 1.5; }
    .tag { display: inline-block; font-size: 11px; font-weight: 600; padding: 2px 9px; border-radius: 20px; margin-top: 8px; }
    .t-html { background: rgba(224,108,117,.12); color: #e06c75; }
    .t-css { background: rgba(97,175,239,.12); color: #61afef; }
    .t-js { background: rgba(229,192,123,.12); color: #e5c07b; }
    .t-react { background: rgba(97,218,251,.12); color: #61dafb; }
    .t-node { background: rgba(152,195,121,.12); color: #98c379; }
    .t-tools { background: rgba(198,120,221,.12); color: #c678dd; }
    .note { background: rgba(97,175,239,.06); border: 1px solid rgba(97,175,239,.15); border-radius: var(--radius-sm); padding: 14px 18px; margin: 18px 0; font-size: 14px; line-height: 1.7; color: var(--text-secondary); }
    .note strong { color: #61afef; }
    .tip { background: rgba(152,195,121,.06); border: 1px solid rgba(152,195,121,.15); border-radius: var(--radius-sm); padding: 14px 18px; margin: 18px 0; font-size: 14px; line-height: 1.7; color: var(--text-secondary); }
    .tip strong { color: #98c379; }
    .mob-toggle { display: none; position: fixed; bottom: 20px; left: 20px; z-index: 200; width: 48px; height: 48px; border-radius: 50%; background: var(--accent); color: #111; border: none; cursor: pointer; align-items: center; justify-content: center; box-shadow: 0 4px 20px rgba(0,0,0,.4); }
    .learn-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 99; }
    .learn-overlay.show { display: block; }
    @media (max-width: 860px) {
      .learn-side { transform: translateX(-100%); z-index: 150; transition: transform .3s; }
      .learn-side.open { transform: translateX(0); }
      .mob-toggle { display: flex; }
      .learn-body { margin-left: 0; padding: 28px 18px 80px; }
    }
  </style>
</head>

<body>
  <div class="learn-wrap">
    <div class="learn-overlay" id="ov"></div>
    <aside class="learn-side" id="side">
      <div class="learn-side-hdr">
        <a href="/" style="display:flex;align-items:center;gap:10px;">
          <img src="logo.png" alt="Deoit"><span>Learn</span>
        </a>
      </div>
      <nav id="nav"></nav>
    </aside>
    <main class="learn-body" id="main"></main>
  </div>
  <button class="mob-toggle" id="mobBtn" aria-label="Menu">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 6h16M4 12h16M4 18h16"/></svg>
  </button>
  <script src="js/learn.js"></script>
</body>

</html>
