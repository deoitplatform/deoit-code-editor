<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Learn Web Development - Deoit</title>
<meta name="description" content="Learn HTML, CSS, JavaScript, React, and Node.js for free. Interactive tutorials with live code examples.">
<meta name="author" content="Majed Qandeel">
<meta name="robots" content="index, follow">
<meta property="og:title" content="Learn Web Development - Deoit">
<meta property="og:description" content="Free interactive web development tutorials.">
<meta property="og:image" content="https://deoit.vercel.app/logo.png">
<link rel="canonical" href="https://deoit.vercel.app/learn">
<link rel="icon" type="image/png" href="logo.png">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg-dark:#0d0d0d;--bg-card:#111111;--bg-code:#161616;--bg-elevated:#1a1a1a;
  --text-primary:#e0e0e0;--text-secondary:#888;--text-muted:#484848;
  --accent:#d9d9d9;--accent-hover:#b0b0b0;
  --accent-html:#e06c75;--accent-css:#61afef;--accent-js:#e5c07b;--accent-react:#61dafb;--accent-node:#98c379;--accent-tools:#c678dd;
  --border:rgba(255,255,255,.08);--border-strong:rgba(255,255,255,.14);
  --font-sans:'Inter','Segoe UI',system-ui,-apple-system,sans-serif;
  --font-mono:'JetBrains Mono','Cascadia Code','Fira Code',Consolas,monospace;
  --radius:14px;--radius-sm:10px;--radius-xs:6px;
}
html{scroll-behavior:smooth}
body{font-family:var(--font-sans);background:var(--bg-dark);color:var(--text-primary);overflow-x:hidden;line-height:1.6}
a{color:inherit;text-decoration:none}
::selection{background:rgba(217,217,217,.12)}

@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

/* ═══ NAV ═══ */
.l-nav{
  position:fixed;top:0;left:0;right:0;height:56px;z-index:200;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 40px;background:rgba(13,13,13,.88);backdrop-filter:blur(32px) saturate(1.4);
  border-bottom:1px solid rgba(255,255,255,.05);
}
.l-nav .logo{display:flex;align-items:center;gap:10px;font-weight:700;font-size:16px;letter-spacing:-.3px}
.l-nav .logo img{width:26px;height:26px;border-radius:7px}
.l-nav .links{display:flex;align-items:center;gap:4px}
.l-nav .links a{
  font-size:13px;color:var(--text-secondary);font-weight:500;
  padding:7px 14px;border-radius:var(--radius-xs);transition:all .2s;
}
.l-nav .links a:hover{color:var(--text-primary);background:rgba(255,255,255,.05)}
.l-nav .links a.active{color:#fff;background:rgba(255,255,255,.08)}
.l-nav .nav-btn{
  background:rgba(255,255,255,.92);color:#0d0d0d;padding:7px 20px;border-radius:var(--radius-xs);
  font-size:13px;font-weight:700;cursor:pointer;border:none;font-family:var(--font-sans);
  transition:all .25s;
}
.l-nav .nav-btn:hover{background:#fff;transform:translateY(-1px);box-shadow:0 6px 24px rgba(255,255,255,.08)}

/* ═══ HERO ═══ */
.l-hero{
  text-align:center;padding:130px 24px 56px;max-width:720px;margin:0 auto;position:relative;
}
.l-hero::before{
  content:'';position:absolute;top:40%;left:50%;transform:translate(-50%,-50%);
  width:500px;height:500px;background:radial-gradient(circle,rgba(217,217,217,.04) 0%,transparent 70%);
  pointer-events:none;
}
.l-hero h1{
  font-size:clamp(36px,5.5vw,52px);font-weight:800;letter-spacing:-2px;margin-bottom:18px;
  line-height:1.05;background:linear-gradient(180deg,#fff 30%,#888 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
.l-hero p{font-size:16px;color:var(--text-secondary);max-width:500px;margin:0 auto;line-height:1.75}

/* ═══ LANG TABS ═══ */
.l-tabs-wrap{max-width:900px;margin:0 auto;padding:0 24px}
.l-tabs{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-bottom:44px}
.l-tab{
  display:flex;align-items:center;gap:9px;
  padding:10px 22px;border-radius:40px;
  background:rgba(255,255,255,.03);border:1px solid var(--border);
  font-size:13px;font-weight:600;color:var(--text-secondary);cursor:pointer;
  transition:all .25s;font-family:var(--font-sans);user-select:none;
}
.l-tab:hover{border-color:var(--border-strong);color:var(--text-primary);background:rgba(255,255,255,.05)}
.l-tab.on{
  color:#fff;background:rgba(255,255,255,.08);border-color:rgba(255,255,255,.15);
  box-shadow:0 0 24px rgba(255,255,255,.04);
}
.l-tab .dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}

/* ═══ LESSONS ═══ */
.l-lessons{max-width:900px;margin:0 auto;padding:0 24px 40px}
.l-lessons-title{
  font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;
  color:var(--text-muted);margin-bottom:18px;padding-left:2px;
}

.l-lesson-list{display:flex;flex-direction:column;gap:5px;margin-bottom:48px}
.l-lesson-item{
  display:flex;align-items:center;gap:14px;
  padding:15px 20px;border-radius:var(--radius-sm);
  background:rgba(255,255,255,.02);border:1px solid transparent;
  cursor:pointer;transition:all .2s;
}
.l-lesson-item:hover{
  background:rgba(255,255,255,.04);border-color:var(--border);
  transform:translateX(6px);
}
.l-lesson-item.on{
  background:rgba(255,255,255,.05);border-color:var(--border-strong);
  box-shadow:0 2px 16px rgba(0,0,0,.2);
}
.l-lesson-item .num{
  width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:700;flex-shrink:0;color:#0d0d0d;
}
.l-lesson-item .info{flex:1}
.l-lesson-item .info .t{font-size:14px;font-weight:600;color:var(--text-primary)}
.l-lesson-item .info .d{font-size:12px;color:var(--text-muted);margin-top:3px}
.l-lesson-item .arr{
  color:var(--text-muted);font-size:13px;transition:all .2s;opacity:.5;
}
.l-lesson-item:hover .arr{transform:translateX(4px);color:var(--text-secondary);opacity:1}

/* ═══ CONTENT ═══ */
.l-content{max-width:820px;margin:0 auto;padding:0 24px 80px}
.l-content-header{
  padding:36px 0 28px;border-bottom:1px solid var(--border);margin-bottom:36px;
}
.l-content-header h2{font-size:30px;font-weight:800;letter-spacing:-.8px;margin-bottom:10px}
.l-content-header p{font-size:15px;color:var(--text-secondary);line-height:1.75}

.l-content h3{font-size:17px;font-weight:700;margin:36px 0 14px;color:var(--text-primary);letter-spacing:-.2px}
.l-content p{font-size:15px;color:var(--text-secondary);line-height:1.8;margin-bottom:18px}
.l-content ul,.l-content ol{margin:0 0 22px 20px;color:var(--text-secondary);font-size:15px;line-height:1.8}
.l-content li{margin-bottom:6px}
.l-content strong{color:var(--text-primary);font-weight:600}
.l-content code{
  font-family:var(--font-mono);font-size:12.5px;background:rgba(229,192,123,.08);
  padding:2px 7px;border-radius:4px;color:var(--accent-js);
}
.l-content a{color:var(--accent);text-decoration:underline;text-decoration-color:rgba(255,255,255,.15);text-underline-offset:2px;transition:text-decoration-color .2s}
.l-content a:hover{text-decoration-color:rgba(255,255,255,.4)}

/* code block */
.l-content pre{
  background:var(--bg-code);border:1px solid var(--border);border-radius:var(--radius-sm);
  padding:20px 24px;overflow-x:auto;margin:0 0 28px;font-family:var(--font-mono);
  font-size:13px;line-height:1.85;
}
.l-content pre code{background:none;padding:0;color:var(--text-primary)}

/* example box */
.l-ex{
  background:var(--bg-card);border:1px solid var(--border);
  border-radius:var(--radius-sm);margin:0 0 28px;overflow:hidden;
  box-shadow:0 2px 12px rgba(0,0,0,.15);
}
.l-ex-top{
  padding:10px 16px;background:var(--bg-code);border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
}
.l-ex-dots{display:flex;gap:6px}
.l-ex-dots span{width:10px;height:10px;border-radius:50%}
.l-ex-dots span:nth-child(1){background:#ff5f57}
.l-ex-dots span:nth-child(2){background:#febc2e}
.l-ex-dots span:nth-child(3){background:#28c840}
.l-ex-title{font-size:12px;font-weight:600;color:var(--text-muted);margin-left:12px;flex:1}
.l-ex-btn{
  background:rgba(255,255,255,.9);color:#0d0d0d;border:none;padding:5px 14px;border-radius:5px;
  font-size:11px;font-weight:700;cursor:pointer;font-family:var(--font-sans);transition:all .2s;
}
.l-ex-btn:hover{background:#fff;transform:translateY(-1px);box-shadow:0 2px 10px rgba(255,255,255,.1)}
.l-ex-body pre{margin:0;border:0;border-radius:0;background:transparent}

/* callouts */
.l-note{background:rgba(97,175,239,.05);border-left:3px solid var(--accent-css);border-radius:0 var(--radius-sm) var(--radius-sm) 0;padding:14px 20px;margin:22px 0;font-size:14px;line-height:1.7;color:var(--text-secondary)}
.l-note strong{color:var(--accent-css)}
.l-tip{background:rgba(229,192,123,.05);border-left:3px solid var(--accent-js);border-radius:0 var(--radius-sm) var(--radius-sm) 0;padding:14px 20px;margin:22px 0;font-size:14px;line-height:1.7;color:var(--text-secondary)}
.l-tip strong{color:var(--accent-js)}
.l-warn{background:rgba(224,108,117,.05);border-left:3px solid var(--accent-html);border-radius:0 var(--radius-sm) var(--radius-sm) 0;padding:14px 20px;margin:22px 0;font-size:14px;line-height:1.7;color:var(--text-secondary)}
.l-warn strong{color:var(--accent-html)}

/* table */
.l-content table{width:100%;border-collapse:collapse;margin:0 0 22px;font-size:14px;border-radius:var(--radius-sm);overflow:hidden;border:1px solid var(--border)}
.l-content th,.l-content td{padding:11px 16px;border-bottom:1px solid var(--border);text-align:left}
.l-content tr:last-child td{border-bottom:none}
.l-content th{background:rgba(255,255,255,.03);font-weight:600;font-size:12px;text-transform:uppercase;letter-spacing:.5px;color:var(--text-muted)}
.l-content td{color:var(--text-secondary)}

/* nav buttons */
.l-navs{display:flex;gap:12px;margin-top:52px;padding-top:28px;border-top:1px solid var(--border)}
.l-nav-btn{
  flex:1;padding:18px 22px;background:rgba(255,255,255,.02);border:1px solid var(--border);
  border-radius:var(--radius-sm);cursor:pointer;transition:all .25s;max-width:48%;
}
.l-nav-btn:hover{border-color:var(--border-strong);transform:translateY(-2px);background:rgba(255,255,255,.04)}
.l-nav-btn .lbl{font-size:11px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.8px;font-weight:600;margin-bottom:6px}
.l-nav-btn .ttl{font-size:14px;font-weight:600;color:var(--text-primary)}
.l-nav-btn.nxt{text-align:right;margin-left:auto}

/* ═══ MOBILE ═══ */
@media(max-width:768px){
  .l-nav{padding:0 16px}
  .l-nav .links{display:none}
  .l-hero{padding:100px 16px 32px}
  .l-hero h1{font-size:28px;letter-spacing:-1px}
  .l-hero::before{width:300px;height:300px}
  .l-tabs{gap:6px}
  .l-tab{padding:8px 14px;font-size:12px;border-radius:20px}
  .l-lesson-item{padding:12px 16px}
  .l-lesson-item:hover{transform:translateX(3px)}
  .l-content{padding:0 16px 60px}
  .l-navs{flex-direction:column;gap:10px}
  .l-nav-btn{max-width:100%}
}
</style>
</head>
<body>

<nav class="l-nav">
  <a href="/" class="logo"><img src="logo.png" alt="Deoit"><span>Deoit</span></a>
  <div class="links">
    <a href="/">Home</a>
    <a href="pages/editor">Editor</a>
    <a href="/learn" class="active">Learn</a>
    <a href="/#contact">Contact</a>
  </div>
  <a href="pages/editor" class="nav-btn">Open Editor</a>
</nav>

<div class="l-hero">
  <h1>Learn to Build for the Web</h1>
  <p>Step-by-step tutorials covering everything from HTML basics to full-stack JavaScript. Run every example in the editor instantly.</p>
</div>

<div class="l-tabs-wrap">
  <div class="l-tabs" id="lTabs"></div>
</div>

<div class="l-lessons" id="lLessonsWrap">
  <div class="l-lessons-title" id="lLessonsTitle"></div>
  <div class="l-lesson-list" id="lLessonList"></div>
</div>

<div class="l-content" id="lContent" style="display:none">
  <div class="l-content-header" id="lContentHeader"></div>
  <div id="lContentBody"></div>
  <div class="l-navs" id="lNavs"></div>
</div>

<div style="height:80px"></div>

  plausible.init()
</script>
<script src="js/learn.js"></script>
</body>
</html>
