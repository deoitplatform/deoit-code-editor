<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Learn Web Development - Deoit</title>
<meta name="description" content="Learn HTML, CSS, JavaScript, React, and Node.js for free. Interactive tutorials with live code examples.">
<meta name="author" content="Majed Qandeel">
<meta name="robots" content="index, follow">
<meta property="og:title" content="Learn Web Development - Deoit">
<meta property="og:description" content="Free interactive web development tutorials.">
<meta property="og:image" content="https://deoit.vercel.app/logo.png">
<link rel="canonical" href="https://deoit.vercel.app/learn">
<link rel="icon" type="image/png" href="logo.png">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --c-bg:#09090b;--c-surface:#111113;--c-raised:#18181b;--c-overlay:#1f1f23;--c-border:#27272a;--c-border2:#3f3f46;
  --c-text:#fafafa;--c-text2:#a1a1aa;--c-text3:#71717a;--c-text4:#52525b;
  --c-green:#22c55e;--c-green2:#16a34a;--c-blue:#3b82f6;--c-red:#ef4444;--c-amber:#f59e0b;--c-purple:#a855f7;
  --c-html:#f87171;--c-css:#60a5fa;--c-js:#fbbf24;--c-react:#67e8f9;--c-node:#4ade80;
  --font:'DM Sans',system-ui,sans-serif;--mono:'JetBrains Mono',monospace;
  --sidebar-w:280px;
}
html{scroll-behavior:smooth}
body{font-family:var(--font);background:var(--c-bg);color:var(--c-text);line-height:1.6;-webkit-font-smoothing:antialiased}
a{color:inherit;text-decoration:none}
::selection{background:rgba(34,197,94,.2)}

/* ═══ LAYOUT ═══ */
.l-wrap{display:flex;min-height:100vh}

/* ═══ SIDEBAR ═══ */
.l-sidebar{
  width:var(--sidebar-w);position:fixed;top:0;left:0;height:100vh;
  background:var(--c-surface);border-right:1px solid var(--c-border);
  display:flex;flex-direction:column;z-index:100;transition:transform .3s cubic-bezier(.4,0,.2,1);
}
.l-sidebar::-webkit-scrollbar{width:0}

.l-sb-head{
  padding:20px;border-bottom:1px solid var(--c-border);display:flex;align-items:center;gap:12px;flex-shrink:0;
}
.l-sb-head a{display:flex;align-items:center;gap:10px}
.l-sb-head img{width:30px;height:30px;border-radius:8px}
.l-sb-head .t{font-weight:700;font-size:16px;letter-spacing:-.3px}
.l-sb-badge{
  font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;
  background:var(--c-green);color:#000;padding:2px 6px;border-radius:4px;margin-left:auto;
}

.l-sb-search{padding:12px 16px 8px;flex-shrink:0}
.l-sb-search input{
  width:100%;padding:10px 14px 10px 36px;background:var(--c-raised);border:1px solid var(--c-border);
  border-radius:10px;color:var(--c-text);font-size:13px;font-family:var(--font);outline:none;transition:border .2s;
}
.l-sb-search input:focus{border-color:var(--c-border2)}
.l-sb-search input::placeholder{color:var(--c-text4)}
.l-sb-search .ico{position:absolute;left:28px;top:50%;transform:translateY(-50%);pointer-events:none;color:var(--c-text4)}
.l-sb-search{position:relative}

.l-sb-nav{flex:1;overflow-y:auto;padding:8px 0 32px}
.l-sb-nav::-webkit-scrollbar{width:3px}
.l-sb-nav::-webkit-scrollbar-thumb{background:var(--c-border);border-radius:3px}

.l-sb-group{margin-bottom:8px}
.l-sb-group-t{
  padding:10px 20px 6px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;
  color:var(--c-text4);display:flex;align-items:center;gap:8px;cursor:pointer;user-select:none;
}
.l-sb-group-t .dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.l-sb-group-t .chev{margin-left:auto;transition:transform .2s;font-size:8px;color:var(--c-text4)}
.l-sb-group.closed .chev{transform:rotate(-90deg)}
.l-sb-group.closed .l-sb-group-items{display:none}

.l-sb-group-items{display:flex;flex-direction:column;gap:0}
.l-sb-item{
  display:flex;align-items:center;gap:10px;padding:7px 20px 7px 30px;
  font-size:13px;color:var(--c-text2);cursor:pointer;transition:all .12s;position:relative;
}
.l-sb-item::before{
  content:'';position:absolute;left:18px;top:50%;width:0;height:2px;
  background:var(--c-green);border-radius:1px;transform:translateY(-50%);transition:width .15s;
}
.l-sb-item:hover{color:var(--c-text);background:rgba(255,255,255,.02)}
.l-sb-item.on{color:var(--c-text);font-weight:600}
.l-sb-item.on::before{width:12px}
.l-sb-progress{
  padding:12px 16px;border-top:1px solid var(--c-border);flex-shrink:0;
}
.l-sb-progress .bar{height:3px;background:var(--c-border);border-radius:3px;overflow:hidden}
.l-sb-progress .bar-fill{height:100%;background:var(--c-green);border-radius:3px;transition:width .3s}
.l-sb-progress .txt{font-size:10px;color:var(--c-text4);margin-top:6px;font-weight:600}

/* ═══ MAIN ═══ */
.l-main{flex:1;margin-left:var(--sidebar-w);display:flex;flex-direction:column;min-height:100vh}

.l-topbar{
  position:sticky;top:0;z-index:50;height:52px;display:flex;align-items:center;
  padding:0 40px;background:rgba(9,9,11,.8);backdrop-filter:blur(20px) saturate(1.4);
  border-bottom:1px solid var(--c-border);gap:12px;
}
.l-topbar .burger{display:none;background:none;border:none;color:var(--c-text);cursor:pointer;padding:6px;border-radius:6px}
.l-topbar .burger:hover{background:var(--c-raised)}
.l-bc{font-size:13px;color:var(--c-text3);display:flex;align-items:center;gap:0}
.l-bc a{color:var(--c-text3);transition:color .15s}
.l-bc a:hover{color:var(--c-text)}
.l-bc .s{margin:0 10px;font-size:9px;color:var(--c-text4)}
.l-topbar-r{margin-left:auto;display:flex;gap:10px;align-items:center}
.l-topbar-r .btn-edit{
  display:inline-flex;align-items:center;gap:6px;
  background:var(--c-green);color:#000;padding:7px 16px;border-radius:8px;
  font-size:12px;font-weight:700;border:none;cursor:pointer;font-family:var(--font);
  transition:all .15s;text-decoration:none;
}
.l-topbar-r .btn-edit:hover{background:var(--c-green2);transform:translateY(-1px);box-shadow:0 4px 16px rgba(34,197,94,.2)}

/* ═══ ARTICLE ═══ */
.l-article{max-width:760px;width:100%;margin:0 auto;padding:52px 48px 120px;flex:1}

.l-article h1{font-size:42px;font-weight:700;letter-spacing:-1.5px;line-height:1.1;margin-bottom:20px;color:var(--c-text)}
.l-article .l-intro{
  font-size:17px;color:var(--c-text2);line-height:1.7;margin-bottom:48px;
  padding-bottom:36px;border-bottom:1px solid var(--c-border);
}

.l-article h2{
  font-size:26px;font-weight:700;letter-spacing:-.5px;margin:56px 0 18px;color:var(--c-text);
}
.l-article h3{font-size:19px;font-weight:600;margin:36px 0 12px;color:var(--c-text)}
.l-article p{font-size:15.5px;color:var(--c-text2);line-height:1.8;margin-bottom:18px}
.l-article ul,.l-article ol{margin:0 0 20px;color:var(--c-text2);font-size:15px;line-height:1.9;padding-left:24px}
.l-article li{margin-bottom:6px}
.l-article li::marker{color:var(--c-text4)}
.l-article strong{color:var(--c-text);font-weight:600}
.l-article code{
  font-family:var(--mono);font-size:13px;background:var(--c-raised);padding:2px 7px;
  border-radius:5px;color:var(--c-amber);
}
.l-article pre{
  background:var(--c-raised);border:1px solid var(--c-border);border-radius:12px;
  padding:20px 24px;overflow-x:auto;margin:0 0 28px;font-family:var(--mono);font-size:13px;line-height:1.85;
}
.l-article pre code{background:none;padding:0;color:var(--c-text);border:0}
.l-article table{width:100%;border-collapse:collapse;margin:0 0 24px;border-radius:10px;overflow:hidden;border:1px solid var(--c-border)}
.l-article th,.l-article td{padding:12px 16px;text-align:left}
.l-article th{background:var(--c-raised);font-weight:600;font-size:12px;text-transform:uppercase;letter-spacing:.4px;color:var(--c-text3);border-bottom:1px solid var(--c-border)}
.l-article td{font-size:14px;color:var(--c-text2);border-bottom:1px solid var(--c-border)}
.l-article tr:last-child td{border-bottom:none}
.l-article a{color:var(--c-green);font-weight:500}

/* ═══ EXAMPLE ═══ */
.l-ex{
  background:var(--c-raised);border:1px solid var(--c-border);border-radius:14px;
  margin:0 0 28px;overflow:hidden;
}
.l-ex-top{
  padding:12px 20px;display:flex;align-items:center;gap:12px;
  background:var(--c-overlay);border-bottom:1px solid var(--c-border);
}
.l-ex-dots{display:flex;gap:7px}
.l-ex-dots span{width:11px;height:11px;border-radius:50%}
.l-ex-dots span:nth-child(1){background:#ff5f57}
.l-ex-dots span:nth-child(2){background:#febc2e}
.l-ex-dots span:nth-child(3){background:#28c840}
.l-ex-title{font-size:12px;font-weight:600;color:var(--c-text3);flex:1}
.l-ex-btn{
  display:inline-flex;align-items:center;gap:5px;
  background:var(--c-green);color:#000;border:none;padding:6px 14px;border-radius:7px;
  font-size:11.5px;font-weight:700;cursor:pointer;font-family:var(--font);transition:all .15s;
}
.l-ex-btn:hover{background:var(--c-green2);transform:translateY(-1px);box-shadow:0 4px 12px rgba(34,197,94,.2)}
.l-ex-btn svg{width:12px;height:12px}
.l-ex-body pre{margin:0;border:0;border-radius:0;padding:20px 24px;background:transparent}
.l-ex-body pre code{color:var(--c-text);line-height:1.8}

/* ═══ CALLOUTS ═══ */
.l-note{
  background:rgba(59,130,246,.06);border-left:3px solid var(--c-blue);
  padding:14px 20px;margin:24px 0;border-radius:0 10px 10px 0;font-size:14px;line-height:1.7;color:var(--c-text2);
}
.l-note b{color:var(--c-blue);font-weight:600}

.l-tip{
  background:rgba(34,197,94,.06);border-left:3px solid var(--c-green);
  padding:14px 20px;margin:24px 0;border-radius:0 10px 10px 0;font-size:14px;line-height:1.7;color:var(--c-text2);
}
.l-tip b{color:var(--c-green);font-weight:600}

.l-warn{
  background:rgba(239,68,68,.06);border-left:3px solid var(--c-red);
  padding:14px 20px;margin:24px 0;border-radius:0 10px 10px 0;font-size:14px;line-height:1.7;color:var(--c-text2);
}
.l-warn b{color:var(--c-red);font-weight:600}

/* ═══ HOME ═══ */
.l-home{text-align:center;padding:24px 0 0}
.l-home .badge{
  display:inline-flex;align-items:center;gap:6px;
  background:var(--c-raised);border:1px solid var(--c-border);border-radius:20px;
  padding:6px 14px;font-size:12px;font-weight:600;color:var(--c-text2);margin-bottom:24px;
}
.l-home .badge .dot{width:6px;height:6px;border-radius:50%;background:var(--c-green)}
.l-home h1{font-size:clamp(36px,5vw,50px);font-weight:700;letter-spacing:-2px;line-height:1.08;margin-bottom:18px}
.l-home .hl{background:linear-gradient(135deg,var(--c-green),#86efac);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.l-home .sub{font-size:17px;color:var(--c-text3);max-width:480px;margin:0 auto 48px;line-height:1.6}

.l-home-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px;text-align:left}
.l-home-card{
  background:var(--c-surface);border:1px solid var(--c-border);border-radius:14px;
  padding:24px;cursor:pointer;transition:all .2s;text-decoration:none;color:inherit;position:relative;overflow:hidden;
}
.l-home-card::after{
  content:'';position:absolute;top:0;left:0;right:0;height:3px;
  border-radius:14px 14px 0 0;opacity:0;transition:opacity .2s;
}
.l-home-card[data-c="html"]::after{background:var(--c-html)}
.l-home-card[data-c="css"]::after{background:var(--c-css)}
.l-home-card[data-c="js"]::after{background:var(--c-js)}
.l-home-card[data-c="react"]::after{background:var(--c-react)}
.l-home-card[data-c="node"]::after{background:var(--c-node)}
.l-home-card[data-c="tools"]::after{background:var(--c-purple)}
.l-home-card[data-c="start"]::after{background:var(--c-green)}
.l-home-card:hover{border-color:var(--c-border2);transform:translateY(-3px);box-shadow:0 8px 32px rgba(0,0,0,.3)}
.l-home-card:hover::after{opacity:1}
.l-home-card .emoji{font-size:28px;margin-bottom:14px;display:block}
.l-home-card h3{font-size:17px;font-weight:700;margin-bottom:4px;color:var(--c-text)}
.l-home-card .desc{font-size:13px;color:var(--c-text3);margin:0;line-height:1.5}
.l-home-card .count{font-size:11px;color:var(--c-text4);margin-top:14px;font-weight:600;letter-spacing:.3px}

/* ═══ NAV BTNS ═══ */
.l-navs{display:flex;gap:12px;margin-top:64px;padding-top:32px;border-top:1px solid var(--c-border)}
.l-nav{
  flex:1;padding:18px 20px;background:var(--c-surface);border:1px solid var(--c-border);
  border-radius:12px;text-decoration:none;transition:all .2s;max-width:48%;
}
.l-nav:hover{border-color:var(--c-border2);transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,.25)}
.l-nav .nbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--c-text4);margin-bottom:6px}
.l-nav .nbt{font-size:14px;font-weight:600;color:var(--c-text)}
.l-nav.nxt{text-align:right;margin-left:auto}

/* ═══ OVERLAY ═══ */
.l-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:99;backdrop-filter:blur(4px)}
.l-ov.show{display:block}

@media(max-width:860px){
  .l-sidebar{transform:translateX(-100%);z-index:200;width:290px}
  .l-sidebar.open{transform:translateX(0)}
  .l-ov.show{display:block}
  .l-topbar .burger{display:flex}
  .l-main{margin-left:0}
  .l-article{padding:32px 20px 80px}
  .l-article h1{font-size:30px}
  .l-navs{flex-direction:column;gap:10px}
  .l-nav{max-width:100%}
}
</style>
</head>
<body>
<div class="l-wrap">
  <div class="l-ov" id="learnOv"></div>
  <aside class="l-sidebar" id="learnSide">
    <div class="l-sb-head">
      <a href="/"><img src="logo.png" alt="Deoit"></a>
      <a href="/" class="t">Learn</a>
      <span class="l-sb-badge">free</span>
    </div>
    <div class="l-sb-search">
      <svg class="ico" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input type="text" id="learnSearchInput" placeholder="Search lessons...">
    </div>
    <nav class="l-sb-nav" id="learnNav"></nav>
    <div class="l-sb-progress"><div class="bar"><div class="bar-fill" id="learnProgress" style="width:0%"></div></div><div class="txt" id="learnProgressTxt">0 / 0 completed</div></div>
  </aside>
  <div class="l-main">
    <div class="l-topbar">
      <button class="burger" id="learnMobBtn" aria-label="Menu">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 6h16M4 12h16M4 18h16"/></svg>
      </button>
      <div class="l-bc" id="learnBreadcrumb"></div>
      <div class="l-topbar-r">
        <a href="pages/editor" class="btn-edit">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M13.5 6H5.25A2.25 2.25 0 003 8.25v10.5A2.25 2.25 0 005.25 21h10.5A2.25 2.25 0 0018 18.75V10.5m-10.5 6L21 3m0 0h-5.25M21 3v5.25"/></svg>
          Editor
        </a>
      </div>
    </div>
    <div class="l-article" id="learnArticle"></div>
  </div>
</div>

<script async src="https://plausible.io/js/pa-QT4H3sRvZliBQhekUGtf7.js"></script>
<script>
  window.plausible=window.plausible||function(){(plausible.q=plausible.q||[]).push(arguments)},plausible.init=plausible.init||function(i){plausible.o=i||{}};
  plausible.init()
</script>
<script src="js/learn.js"></script>
</body>
</html>
