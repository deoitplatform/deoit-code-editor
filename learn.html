<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Learn Web Development - Deoit</title>
<meta name="description" content="Learn HTML, CSS, JavaScript, React, and Node.js for free. Interactive tutorials with live code examples.">
<meta name="author" content="Majed Qandeel">
<meta name="robots" content="index, follow">
<meta property="og:title" content="Learn Web Development - Deoit">
<meta property="og:description" content="Free interactive web development tutorials.">
<meta property="og:image" content="https://deoit.vercel.app/logo.png">
<link rel="canonical" href="https://deoit.vercel.app/learn">
<link rel="icon" type="image/png" href="logo.png">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg-dark:#0d0d0d;--bg-card:#141414;--bg-code:#1a1a1a;
  --text-primary:#d9d9d9;--text-secondary:#8a8a8a;--text-muted:#484848;
  --accent:#d9d9d9;--accent-hover:#b0b0b0;
  --accent-html:#e06c75;--accent-css:#61afef;--accent-js:#e5c07b;--accent-react:#61dafb;--accent-node:#98c379;--accent-tools:#c678dd;
  --border:#2a2a2a;--border-subtle:#1a1a1a;
  --font-sans:'Inter','Segoe UI',system-ui,-apple-system,sans-serif;
  --font-mono:'JetBrains Mono','Cascadia Code','Fira Code',Consolas,monospace;
  --radius:12px;--radius-sm:8px;
}
html{scroll-behavior:smooth}
body{font-family:var(--font-sans);background:var(--bg-dark);color:var(--text-primary);overflow-x:hidden;line-height:1.6}
a{color:inherit;text-decoration:none}
::selection{background:rgba(217,217,217,.12)}

/* ═══ NAV ═══ */
.l-nav{
  position:fixed;top:0;left:0;right:0;height:60px;z-index:200;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 40px;background:rgba(13,13,13,.85);backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border-subtle);
}
.l-nav .logo{display:flex;align-items:center;gap:10px;font-weight:700;font-size:17px}
.l-nav .logo img{width:28px;height:28px;border-radius:6px}
.l-nav .links{display:flex;align-items:center;gap:24px}
.l-nav .links a{font-size:14px;color:var(--text-secondary);font-weight:500;transition:color .15s}
.l-nav .links a:hover{color:var(--text-primary)}
.l-nav .links a.active{color:var(--text-primary)}
.l-nav .nav-btn{
  background:var(--accent);color:#0d0d0d;padding:8px 18px;border-radius:var(--radius-sm);
  font-size:13px;font-weight:700;cursor:pointer;border:none;font-family:var(--font-sans);transition:background .15s;
}
.l-nav .nav-btn:hover{background:var(--accent-hover)}

/* ═══ HERO ═══ */
.l-hero{text-align:center;padding:120px 24px 48px;max-width:700px;margin:0 auto}
.l-hero h1{font-size:clamp(32px,5vw,48px);font-weight:800;letter-spacing:-1.5px;margin-bottom:16px;line-height:1.1}
.l-hero p{font-size:17px;color:var(--text-secondary);max-width:520px;margin:0 auto;line-height:1.7}

/* ═══ LANG TABS ═══ */
.l-tabs-wrap{
  max-width:900px;margin:0 auto;padding:0 24px;
}
.l-tabs{
  display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-bottom:48px;
}
.l-tab{
  display:flex;align-items:center;gap:8px;
  padding:10px 20px;border-radius:var(--radius-sm);
  background:var(--bg-card);border:1px solid var(--border-subtle);
  font-size:14px;font-weight:600;color:var(--text-secondary);cursor:pointer;
  transition:all .2s;font-family:var(--font-sans);user-select:none;
}
.l-tab:hover{border-color:var(--border);color:var(--text-primary)}
.l-tab.on{border-color:var(--border);color:var(--text-primary);background:var(--bg-code);box-shadow:0 2px 12px rgba(0,0,0,.3)}
.l-tab .dot{width:8px;height:8px;border-radius:50%}
.l-tab .cnt{font-size:11px;color:var(--text-muted);font-weight:500}

/* ═══ LESSONS ═══ */
.l-lessons{
  max-width:900px;margin:0 auto;padding:0 24px 40px;
}
.l-lessons-title{font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--text-muted);margin-bottom:16px}

.l-lesson-list{display:flex;flex-direction:column;gap:6px;margin-bottom:48px}
.l-lesson-item{
  display:flex;align-items:center;gap:14px;
  padding:14px 20px;border-radius:var(--radius-sm);
  background:var(--bg-card);border:1px solid var(--border-subtle);
  cursor:pointer;transition:all .15s;
}
.l-lesson-item:hover{border-color:var(--border);transform:translateX(4px)}
.l-lesson-item.on{border-color:var(--accent);background:var(--bg-code)}
.l-lesson-item .num{
  width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:700;flex-shrink:0;
}
.l-lesson-item .info{flex:1}
.l-lesson-item .info .t{font-size:14px;font-weight:600;color:var(--text-primary)}
.l-lesson-item .info .d{font-size:12px;color:var(--text-muted);margin-top:2px}
.l-lesson-item .arr{color:var(--text-muted);font-size:12px;transition:transform .15s}
.l-lesson-item:hover .arr{transform:translateX(4px);color:var(--text-secondary)}

/* ═══ CONTENT ═══ */
.l-content{
  max-width:820px;margin:0 auto;padding:0 24px 80px;
}
.l-content-header{
  padding:32px 0 24px;border-bottom:1px solid var(--border-subtle);margin-bottom:32px;
}
.l-content-header h2{font-size:28px;font-weight:800;letter-spacing:-.5px;margin-bottom:8px}
.l-content-header p{font-size:15px;color:var(--text-secondary);line-height:1.7}

.l-content h3{font-size:18px;font-weight:700;margin:32px 0 12px;color:var(--text-primary)}
.l-content p{font-size:15px;color:var(--text-secondary);line-height:1.8;margin-bottom:16px}
.l-content ul,.l-content ol{margin:0 0 20px 20px;color:var(--text-secondary);font-size:15px;line-height:1.8}
.l-content li{margin-bottom:5px}
.l-content strong{color:var(--text-primary);font-weight:600}
.l-content code{font-family:var(--font-mono);font-size:13px;background:var(--bg-code);padding:2px 7px;border-radius:4px;color:var(--accent-js)}
.l-content a{color:var(--accent)}

/* code block */
.l-content pre{
  background:var(--bg-code);border:1px solid var(--border-subtle);border-radius:var(--radius-sm);
  padding:18px 22px;overflow-x:auto;margin:0 0 24px;font-family:var(--font-mono);
  font-size:13px;line-height:1.8;
}
.l-content pre code{background:none;padding:0;color:var(--text-primary)}

/* example box */
.l-ex{background:var(--bg-card);border:1px solid var(--border-subtle);border-radius:var(--radius-sm);margin:0 0 24px;overflow:hidden}
.l-ex-top{padding:10px 16px;background:var(--bg-code);border-bottom:1px solid var(--border-subtle);display:flex;align-items:center;justify-content:space-between}
.l-ex-dots{display:flex;gap:6px}
.l-ex-dots span{width:10px;height:10px;border-radius:50%}
.l-ex-dots span:nth-child(1){background:#ff5f57}
.l-ex-dots span:nth-child(2){background:#febc2e}
.l-ex-dots span:nth-child(3){background:#28c840}
.l-ex-title{font-size:12px;font-weight:600;color:var(--text-muted);margin-left:12px;flex:1}
.l-ex-btn{
  background:var(--accent);color:#0d0d0d;border:none;padding:6px 14px;border-radius:5px;
  font-size:11px;font-weight:700;cursor:pointer;font-family:var(--font-sans);transition:background .15s;
}
.l-ex-btn:hover{background:var(--accent-hover)}
.l-ex-body pre{margin:0;border:0;border-radius:0}

/* callouts */
.l-note{background:rgba(97,175,239,.06);border-left:3px solid var(--accent-css);border-radius:0 var(--radius-sm) var(--radius-sm) 0;padding:14px 18px;margin:20px 0;font-size:14px;line-height:1.7;color:var(--text-secondary)}
.l-note strong{color:var(--accent-css)}
.l-tip{background:rgba(229,192,123,.06);border-left:3px solid var(--accent-js);border-radius:0 var(--radius-sm) var(--radius-sm) 0;padding:14px 18px;margin:20px 0;font-size:14px;line-height:1.7;color:var(--text-secondary)}
.l-tip strong{color:var(--accent-js)}
.l-warn{background:rgba(224,108,117,.06);border-left:3px solid var(--accent-html);border-radius:0 var(--radius-sm) var(--radius-sm) 0;padding:14px 18px;margin:20px 0;font-size:14px;line-height:1.7;color:var(--text-secondary)}
.l-warn strong{color:var(--accent-html)}

/* table */
.l-content table{width:100%;border-collapse:collapse;margin:0 0 20px;font-size:14px}
.l-content th,.l-content td{padding:10px 14px;border:1px solid var(--border-subtle);text-align:left}
.l-content th{background:var(--bg-card);font-weight:600;font-size:13px}
.l-content td{color:var(--text-secondary)}

/* nav buttons */
.l-navs{display:flex;gap:12px;margin-top:48px;padding-top:24px;border-top:1px solid var(--border-subtle)}
.l-nav-btn{
  flex:1;padding:16px 20px;background:var(--bg-card);border:1px solid var(--border-subtle);
  border-radius:var(--radius-sm);cursor:pointer;transition:all .2s;max-width:48%;
}
.l-nav-btn:hover{border-color:var(--border);transform:translateY(-2px)}
.l-nav-btn .lbl{font-size:11px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.6px;font-weight:600;margin-bottom:4px}
.l-nav-btn .ttl{font-size:14px;font-weight:600;color:var(--text-primary)}
.l-nav-btn.nxt{text-align:right;margin-left:auto}

/* ═══ MOBILE ═══ */
@media(max-width:768px){
  .l-nav{padding:0 16px}
  .l-nav .links{display:none}
  .l-hero{padding:100px 16px 32px}
  .l-hero h1{font-size:28px}
  .l-tabs{gap:6px}
  .l-tab{padding:8px 14px;font-size:13px}
  .l-lesson-item{padding:12px 16px}
  .l-content{padding:0 16px 60px}
  .l-navs{flex-direction:column;gap:10px}
  .l-nav-btn{max-width:100%}
}
</style>
</head>
<body>

<nav class="l-nav">
  <a href="/" class="logo"><img src="logo.png" alt="Deoit"><span>Deoit</span></a>
  <div class="links">
    <a href="/">Home</a>
    <a href="pages/editor">Editor</a>
    <a href="/learn" class="active">Learn</a>
    <a href="/#contact">Contact</a>
  </div>
  <a href="pages/editor" class="nav-btn">Open Editor</a>
</nav>

<div class="l-hero">
  <h1>Learn to Build for the Web</h1>
  <p>Step-by-step tutorials covering everything from HTML basics to full-stack JavaScript. Run every example in the editor instantly.</p>
</div>

<div class="l-tabs-wrap">
  <div class="l-tabs" id="lTabs"></div>
</div>

<div class="l-lessons" id="lLessonsWrap">
  <div class="l-lessons-title" id="lLessonsTitle"></div>
  <div class="l-lesson-list" id="lLessonList"></div>
</div>

<div class="l-content" id="lContent" style="display:none">
  <div class="l-content-header" id="lContentHeader"></div>
  <div id="lContentBody"></div>
  <div class="l-navs" id="lNavs"></div>
</div>

</body>
