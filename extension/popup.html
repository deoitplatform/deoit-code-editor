<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 320px; padding: 20px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0d0d0d; color: #e8e8e8;
    }
    .header {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 16px;
    }
    .header img {
      width: 32px; height: 32px; border-radius: 6px;
    }
    .header h1 {
      font-size: 16px; font-weight: 700;
    }
    .header span {
      font-size: 11px; color: #8a8a8a; display: block;
    }
    .btn {
      display: flex; align-items: center; gap: 10px;
      width: 100%; padding: 12px 14px;
      background: #141414; border: 1px solid #252525;
      border-radius: 8px; color: #e8e8e8;
      font-size: 13px; font-weight: 500;
      cursor: pointer; transition: all 0.15s;
      margin-bottom: 8px;
      font-family: inherit;
    }
    .btn:hover {
      background: #1a1a1a; border-color: #333;
    }
    .btn svg {
      width: 18px; height: 18px; flex-shrink: 0;
      opacity: 0.6;
    }
    .btn-primary {
      background: #e8e8e8; color: #111;
      border-color: #e8e8e8; font-weight: 600;
    }
    .btn-primary:hover {
      background: #b0b0b0;
    }
    .footer {
      text-align: center; font-size: 11px;
      color: #484848; margin-top: 12px;
    }
    .footer a {
      color: #8a8a8a; text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="header">
    <img src="https://deoit.vercel.app/logo.png" alt="Deoit">
    <div>
      <h1>Edit in Deoit</h1>
      <span>Free online code editor</span>
    </div>
  </div>

  <button class="btn btn-primary" id="editPage">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <polyline points="16 18 22 12 16 6"/>
      <polyline points="8 6 2 12 8 18"/>
    </svg>
    Edit this page's HTML/CSS/JS
  </button>

  <button class="btn" id="openBlank">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <line x1="12" y1="5" x2="12" y2="19"/>
      <line x1="5" y1="12" x2="19" y2="12"/>
    </svg>
    Open blank editor
  </button>

  <button class="btn" id="openLessons">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/>
    </svg>
    Browse courses
  </button>

  <div class="footer">
    <a href="https://deoit.vercel.app" target="_blank">deoit.vercel.app</a>
  </div>

  <script src="popup.js"></script>
</body>
</html>
