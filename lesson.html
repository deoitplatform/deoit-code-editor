<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lesson — Deoit</title>
  <link rel="icon" type="image/png" href="logo.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #0d0d0d; --bg-card: #141414; --bg-code: #1a1a1a; --bg-hover: #1e1e1e;
      --text: #d9d9d9; --text-sec: #8a8a8a; --text-muted: #484848;
      --border: #2a2a2a; --accent: #d9d9d9;
      --font: 'Inter', system-ui, sans-serif;
      --mono: 'JetBrains Mono', 'Consolas', monospace;
    }
    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--font); }

    .lesson-app { display: flex; height: 100vh; overflow: hidden; }

    /* ─── Sidebar ─── */
    .lesson-sidebar {
      width: 240px; min-width: 240px; background: var(--bg-card);
      border-right: 1px solid var(--border); display: flex; flex-direction: column;
      overflow: hidden;
    }
    .lesson-sidebar-header {
      padding: 16px; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 8px;
    }
    .lesson-sidebar-header img { width: 18px; height: 18px; border-radius: 3px; }
    .lesson-sidebar-header span { font-size: 14px; font-weight: 700; }
    .lesson-list { flex: 1; overflow-y: auto; padding: 8px; }
    .lesson-item {
      display: flex; align-items: center; gap: 8px; padding: 8px 12px;
      border-radius: 4px; cursor: pointer; transition: background 0.1s;
      text-decoration: none; color: var(--text-sec); font-size: 13px;
    }
    .lesson-item:hover { background: var(--bg-hover); color: var(--text); }
    .lesson-item.active { background: rgba(217,217,217,0.06); color: var(--text); }
    .lesson-item .lesson-num {
      font-size: 11px; color: var(--text-muted); width: 18px; flex-shrink: 0;
    }
    .lesson-item.active .lesson-num { color: var(--text-sec); }
    .lesson-lock { width: 14px; height: 14px; margin-left: auto; opacity: 0.35; flex-shrink: 0; }
    .lesson-sidebar-footer {
      padding: 12px 16px; border-top: 1px solid var(--border);
      display: flex; gap: 6px;
    }
    .lesson-sidebar-footer a {
      flex: 1; text-align: center; padding: 6px 0; border-radius: 4px;
      font-size: 12px; text-decoration: none; color: var(--text-sec);
    }
    .lesson-sidebar-footer a:hover { background: var(--bg-hover); color: var(--text); }

    .lesson-list::-webkit-scrollbar { width: 4px; }
    .lesson-list::-webkit-scrollbar-track { background: transparent; }
    .lesson-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    /* ─── Main ─── */
    .lesson-main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

    .lesson-topbar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 8px 20px; background: var(--bg-card); border-bottom: 1px solid var(--border);
    }
    .lesson-topbar-left { display: flex; align-items: center; gap: 8px; }
    .lesson-topbar-left a {
      font-size: 12px; color: var(--text-sec); text-decoration: none; padding: 4px 8px; border-radius: 4px;
    }
    .lesson-topbar-left a:hover { background: var(--bg-hover); color: var(--text); }
    .lesson-topbar-right { display: flex; align-items: center; gap: 6px; }
    .btn { display: inline-flex; align-items: center; gap: 6px; padding: 5px 12px; border-radius: 4px; font-size: 12px; font-weight: 500; text-decoration: none; transition: background 0.1s; cursor: pointer; border: none; font-family: var(--font); }
    .btn-ghost { background: transparent; color: var(--text-sec); }
    .btn-ghost:hover { background: var(--bg-hover); color: var(--text); }
    .btn-accent { background: rgba(217,217,217,0.1); color: var(--text); border: 1px solid var(--border); }
    .btn-accent:hover { background: rgba(217,217,217,0.18); }

    /* ─── Content ─── */
    .lesson-content { flex: 1; overflow-y: auto; }
    .lesson-content-inner { max-width: 760px; margin: 0 auto; padding: 40px 32px 80px; }

    .lesson-content h2 { font-size: 28px; font-weight: 700; margin-bottom: 16px; }
    .lesson-content h3 { font-size: 20px; font-weight: 600; margin: 32px 0 12px; }
    .lesson-content h4 { font-size: 16px; font-weight: 600; margin: 24px 0 8px; color: var(--text); }
    .lesson-content p { font-size: 15px; line-height: 1.7; color: var(--text-sec); margin-bottom: 16px; }
    .lesson-content p strong { color: var(--text); }

    .lesson-content ul { margin: 8px 0 20px 24px; }
    .lesson-content li { font-size: 15px; line-height: 1.7; color: var(--text-sec); margin-bottom: 6px; }
    .lesson-content li strong { color: var(--text); }

    .lesson-content code {
      font-family: var(--mono); font-size: 13px; background: var(--bg-code);
      padding: 2px 6px; border-radius: 3px; color: #e5c07b;
    }

    /* ─── Code block ─── */
    .lesson-code {
      background: var(--bg-code); border: 1px solid var(--border); border-radius: 6px;
      padding: 16px 20px; font-family: var(--mono); font-size: 13px; line-height: 1.7;
      margin: 16px 0 20px; overflow-x: auto; white-space: pre;
    }

    /* ─── Tip box ─── */
    .lesson-tip {
      background: rgba(217,217,217,0.03); border: 1px solid var(--border);
      border-left: 3px solid #4ec9b0; border-radius: 4px;
      padding: 12px 16px; margin: 20px 0; font-size: 14px; color: var(--text-sec); line-height: 1.6;
    }
    .lesson-tip strong { color: var(--text); }

    /* ─── Nav buttons ─── */
    .lesson-nav {
      display: flex; justify-content: space-between; gap: 12px;
      margin-top: 48px; padding-top: 24px; border-top: 1px solid var(--border);
    }
    .lesson-nav a {
      padding: 8px 20px; border-radius: 4px; font-size: 14px; font-weight: 500;
      text-decoration: none; color: var(--text-sec); background: var(--bg-code);
      transition: background 0.1s;
    }
    .lesson-nav a:hover { background: var(--bg-hover); color: var(--text); }
    .lesson-nav .nav-next { margin-left: auto; }

    /* ─── Try it button ─── */
    .try-btn {
      display: inline-block; padding: 8px 20px; border-radius: 4px;
      font-size: 14px; font-weight: 500; text-decoration: none; cursor: pointer;
      background: #4ec9b0; color: #0d0d0d; margin: 8px 0 16px;
      transition: opacity 0.1s; border: none; font-family: var(--font);
    }
    .try-btn:hover { opacity: 0.85; }

    /* ─── Syntax ─── */
    .hl-tag { color: #e06c75; }
    .hl-attr { color: #d19a66; }
    .hl-string { color: #98c379; }
    .hl-comment { color: #5c6370; }
    .hl-selector { color: #e5c07b; }
    .hl-prop { color: #61afef; }
    .hl-value { color: #98c379; }
    .hl-number { color: #d19a66; }
    .hl-keyword { color: #c678dd; }
    .hl-function { color: #61afef; }
    .hl-builtin { color: #e06c75; }

    /* ─── Auth Gate ─── */
    .auth-gate {
      display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7);
      z-index: 1000; align-items: center; justify-content: center; backdrop-filter: blur(4px);
    }
    .auth-gate.show { display: flex; }
    .auth-gate-box {
      background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px;
      padding: 32px; max-width: 340px; width: 90%; text-align: center;
    }
    .auth-gate-box .lock-icon {
      width: 40px; height: 40px; border-radius: 8px; background: rgba(217,217,217,0.06);
      display: flex; align-items: center; justify-content: center; margin: 0 auto 12px;
    }
    .auth-gate-box h3 { font-size: 17px; font-weight: 700; margin-bottom: 6px; }
    .auth-gate-box p { font-size: 13px; color: var(--text-sec); margin-bottom: 16px; line-height: 1.5; }
    .auth-gate-box .btn { padding: 8px 0; width: 100%; justify-content: center; font-size: 14px; }

    @media (max-width: 768px) {
      .lesson-sidebar { width: 200px; min-width: 200px; }
      .lesson-content-inner { padding: 24px 16px; }
    }
  </style>
</head>
<body>
  <div class="lesson-app">
    <!-- Sidebar -->
    <aside class="lesson-sidebar">
      <div class="lesson-sidebar-header">
        <img src="logo.png" alt="Deoit">
        <span>Deoit <span style="color:var(--text-muted);font-weight:400;" id="sidebarTitle">HTML</span></span>
      </div>
      <div class="lesson-list" id="lessonList"></div>
      <div class="lesson-sidebar-footer">
        <a href="index.html">Home</a>
        <a href="learn.html">Courses</a>
        <a href="pages/editor.html">Editor</a>
      </div>
    </aside>

    <!-- Main -->
    <div class="lesson-main">
      <div class="lesson-topbar">
        <div class="lesson-topbar-left">
          <a href="learn.html">&larr; Courses</a>
        </div>
        <div class="lesson-topbar-right">
          <a href="pages/editor.html" class="btn btn-ghost">Try Editor</a>
          <a href="login.html" class="btn btn-accent" id="loginBtn">Sign In</a>
          <div id="userMenu" style="display:none;align-items:center;gap:6px;">
            <span id="userName" style="font-size:12px;color:var(--text-sec);"></span>
            <button id="logoutBtn" class="btn btn-ghost" style="padding:3px 8px;font-size:11px;">Sign Out</button>
          </div>
        </div>
      </div>

      <div class="lesson-content" id="lessonContent">
        <div class="lesson-content-inner" id="lessonContentInner"></div>
      </div>
    </div>

    <!-- Auth Gate -->
    <div class="auth-gate" id="authGate">
      <div class="auth-gate-box">
        <div class="lock-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20" color="var(--text-sec)"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        </div>
        <h3>Lesson Locked</h3>
        <p>Sign in to continue learning.</p>
        <a href="login.html" class="btn btn-accent">Sign In</a>
      </div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/lessons.js"></script>
  <script>
    let currentUser = null;
    let currentLang = null;
    let currentLessonId = 1;

    firebase.auth().onAuthStateChanged(user => {
      currentUser = user;
      const loginBtn = document.getElementById('loginBtn');
      const userMenu = document.getElementById('userMenu');
      const userName = document.getElementById('userName');
      if (user) {
        loginBtn.style.display = 'none';
        userMenu.style.display = 'flex';
        userName.textContent = user.displayName || user.email;
      } else {
        loginBtn.style.display = '';
        userMenu.style.display = 'none';
      }
      renderLesson();
    });
    document.getElementById('logoutBtn').addEventListener('click', () => signOut());

    const params = new URLSearchParams(window.location.search);
    currentLang = params.get('lang') || 'html';
    currentLessonId = parseInt(params.get('lesson')) || 1;

    const course = LESSONS[currentLang];
    if (!course) window.location.href = 'learn.html';

    document.getElementById('sidebarTitle').textContent = course.title;

    function renderSidebar() {
      const list = document.getElementById('lessonList');
      list.innerHTML = '';
      course.lessons.forEach((lesson, i) => {
        const idx = i + 1;
        const isLocked = idx > 1 && !currentUser;
        const item = document.createElement('a');
        item.href = 'lesson.html?lang=' + currentLang + '&lesson=' + idx;
        item.className = 'lesson-item' + (idx === currentLessonId ? ' active' : '');
        item.innerHTML = '<span class="lesson-num">' + idx + '.</span> ' + lesson.title + (isLocked ? '<svg class="lesson-lock" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>' : '');
        list.appendChild(item);
      });
    }

    function renderLesson() {
      renderSidebar();
      const lesson = course.lessons.find(l => l.id === currentLessonId) || course.lessons[0];
      const inner = document.getElementById('lessonContentInner');

      const gate = document.getElementById('authGate');
      if (lesson.id > 1 && !currentUser) {
        gate.classList.add('show');
      } else {
        gate.classList.remove('show');
      }

      let html = lesson.content || '<p>Coming soon.</p>';

      // Add "Try it Yourself" button before nav
      html += '<a href="pages/editor.html" class="try-btn">Try it Yourself &raquo;</a>';

      // Prev / Next nav
      const prev = course.lessons.find(l => l.id === currentLessonId - 1);
      const next = course.lessons.find(l => l.id === currentLessonId + 1);
      const nextLocked = next && next.id > 1 && !currentUser;
      html += '<div class="lesson-nav">';
      if (prev) html += '<a href="lesson.html?lang=' + currentLang + '&lesson=' + prev.id + '" class="nav-prev">&larr; ' + prev.title + '</a>';
      else html += '<div></div>';
      if (next) {
        if (nextLocked) html += '<a href="login.html" class="nav-next">' + next.title + ' &rarr;</a>';
        else html += '<a href="lesson.html?lang=' + currentLang + '&lesson=' + next.id + '" class="nav-next">' + next.title + ' &rarr;</a>';
      }
      html += '</div>';

      inner.innerHTML = html;
    }

    renderLesson();
  </script>
</body>
</html>
