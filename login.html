<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign in — Deoit</title>
  <link rel="icon" type="image/png" href="logo.png">
  <link rel="stylesheet" href="css/login.css">
</head>
<body>
  <div class="login-wrapper">
    <div class="login-card">
      <div class="login-header">
        <div class="logo-wrap">
          <img src="logo.png" alt="Deoit">
        </div>
        <h1>Welcome back</h1>
        <p>Sign in to unlock all features</p>
      </div>
      <div class="login-features">
        <span>&#10003; File explorer</span>
        <span>&#10003; Settings</span>
        <span>&#10003; Export &amp; Download</span>
      </div>
      <div class="login-body">
        <button class="login-btn google" id="btnGoogle">
          <svg viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
          <span class="btn-text">Continue with Google</span>
          <span class="spinner"></span>
        </button>
        <button class="login-btn github" id="btnGithub">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0 0 24 12c0-6.63-5.37-12-12-12z"/></svg>
          <span class="btn-text">Continue with GitHub</span>
          <span class="spinner"></span>
        </button>
      </div>
      <div class="login-footer">
        <p>By continuing, you agree to the <a href="terms.html">Terms</a> &amp; <a href="privacy.html">Privacy</a>.</p>
      </div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
  <script src="js/auth.js"></script>
  <script>
    (function() {
      // if already signed in or just signed in via popup
      auth.onAuthStateChanged(function(user) {
        if (user) window.location.replace('pages/editor.html');
      });

      var bg = document.getElementById('btnGoogle');
      var bg2 = document.getElementById('btnGithub');

      function doSignIn(provider, btn) {
        btn.classList.add('loading'); btn.disabled = true;
        provider().catch(function(err) {
          btn.classList.remove('loading'); btn.disabled = false;
          alert('Sign-in failed. Please try again.');
        });
      }

      bg.addEventListener('click', function() { doSignIn(signInGoogle, bg); });
      bg2.addEventListener('click', function() { doSignIn(signInGithub, bg2); });
    })();
  </script>
</body>
</html>
